- name: Send Pickem Alert Broadcast
      run: |
        curl -X POST "https://api.pushalert.co/api/v1/send" \
        -H "Content-Type: application/x-www-form-urlencoded" \
        -d "api_key=your_pushalert_api_key" \
        -d "title=CFB Pickem" \
        -d "message=Update your picks before kickoff!" \
        -d "url=https://yourusername.github.io/2026_College_Pickem/Homepage.html"
