<html lang="en">
<head>

    <style>
        :root {
            --bg-canvas: #0f172a;       /* Deep slate arcade background */
            --bg-card: #1e293b;         /* Lighter card block */
            --retro-yellow: #facc15;    /* Rank 1 / Title neon */
            --retro-blue: #38bdf8;      /* Secondary highlights */
            --retro-green: #4ade80;     /* Positive morale */
            --retro-red: #f87171;       /* Dead last / Danger zone */
            --pixel-font: 'Press Start 2P', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            background-color: var(--bg-canvas);
            color: #ffffff;
            font-family: Arial, sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1.5rem 1rem;
            overflow-y: auto;
        }

        /* --- NAVIGATION HEADER --- */
        header {
            text-align: center;
            margin-bottom: 1.5rem;
            width: 100%;
            max-width: 500px;
            user-select: none;
        }

        .title {
            font-family: var(--pixel-font);
            font-size: 1.2rem;
            color: var(--retro-yellow);
            text-shadow: 3px 3px 0px #000;
            margin-bottom: 0.75rem;
        }

        .hub-nav {
            display: flex;
            background: #000000;
            border: 3px solid #ffffff;
            padding: 0.25rem;
            justify-content: space-between;
        }

        .nav-tab {
            font-family: var(--pixel-font);
            font-size: 0.65rem;
            padding: 0.5rem;
            color: #64748b;
            text-decoration: none;
        }

        .nav-tab.active {
            color: var(--retro-yellow);
        }

        /* --- LEADERBOARD LIST CONTAINER --- */
        .leaderboard-container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-bottom: 2rem;
        }

        .rank-row {
            background-color: var(--bg-card);
            border: 4px solid #000000;
            box-shadow: 4px 4px 0px #000000;
            display: flex;
            align-items: center;
            padding: 0.75rem 1rem;
            position: relative;
        }

        .rank-row.rank-first { border-color: var(--retro-yellow); }
        .rank-row.rank-last { border-color: var(--retro-red); }

        .position-badge {
            font-family: var(--pixel-font);
            font-size: 0.85rem;
            width: 35px;
            color: #cbd5e1;
        }
        .rank-first .position-badge { color: var(--retro-yellow); }
        .rank-last .position-badge { color: var(--retro-red); }

        .avatar-box {
            width: 32px;
            height: 32px;
            background-color: #000000;
            border: 2px solid #ffffff;
            margin-right: 1rem;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 1px;
            padding: 2px;
        }
        .av-p { background-color: var(--avatar-color, #38bdf8); }
        .av-f { background-color: #ffedd5; }

        .meta-block {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
        }

        .coach-name {
            font-family: var(--pixel-font);
            font-size: 0.8rem;
            letter-spacing: -0.5px;
        }

        .support-wrapper {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .meter-label {
            font-family: var(--pixel-font);
            font-size: 0.5rem;
            color: #64748b;
        }

        .support-meter {
            width: 80px;
            height: 8px;
            background-color: #000000;
            border: 1px solid #ffffff;
            position: relative;
        }

        .meter-fill {
            height: 100%;
            background-color: var(--retro-green);
            width: var(--percentage, 50%);
        }
        .rank-last .meter-fill { background-color: var(--retro-red); }

        .score-box {
            text-align: right;
            margin-left: 0.5rem;
        }

        .total-points {
            font-family: var(--pixel-font);
            font-size: 0.9rem;
            color: var(--retro-green);
        }
        .rank-first .total-points { color: var(--retro-yellow); }

        .trend-indicator {
            font-size: 0.65rem;
            font-weight: bold;
            margin-top: 0.2rem;
        }
        .trend-up { color: var(--retro-green); }
        .trend-down { color: var(--retro-red); }

        /* --- LEAGUE ALERTS PANEL --- */
        .alert-section {
            margin: 10px 0 25px 0;
            text-align: center;
            width: 100%;
            max-width: 500px;
            background: #000000;
            border: 3px dashed var(--retro-blue);
            padding: 1rem;
        }
        .alert-section h3 {
            font-family: var(--pixel-font);
            font-size: 0.75rem;
            color: #ffffff;
            margin-bottom: 0.75rem;
        }
        #enable-alerts-btn {
            font-family: var(--pixel-font);
            font-size: 0.6rem;
            padding: 10px 20px;
            background-color: var(--retro-blue);
            color: #000000;
            border: 2px solid #ffffff;
            cursor: pointer;
            box-shadow: 3px 3px 0px #ffffff;
        }
        #enable-alerts-btn:active {
            box-shadow: 0px 0px 0px #ffffff;
            transform: translate(3px, 3px);
        }
    </style>
</head>
<body>

    <script>
       // No more manual service worker registrations or conversion math here!

const btn = document.getElementById("enable-alerts-btn");

// Clean, instant click handler matching your original setup
btn.addEventListener("click", function() {
    // Check if the script is ready. If it is, trigger the native iOS prompt
    if (typeof pushalert !== 'undefined') {
        pushalert.subscribe();
        
        // Visual confirmation lock on success
        this.innerText = "ALERTS CONNECTED ✅";
        this.style.backgroundColor = "var(--retro-green)";
        this.style.color = "#000000";
    } else {
        // Fallback safety if tapped at the exact millisecond of page load
        alert("System initializing. Please wait a second and tap again!");
    }
});
    </script>
