<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Pick'em - Registration</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Global credentials configuration linking backend infrastructure
       const SUPABASE_URL = 'https://pxwplfxbyjxjpaosswgu.supabase.co';
const SUPABASE_ANON_KEY = 'PASTE_YOUR_LONG_ANON_KEY_HERE';

const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    </script>

    <style>
        /* --- RETRO CONFIG VARIABLES --- */
        :root {
            --pixel-font: 'Courier New', Courier, monospace;
            --retro-yellow: #fde047;
            --slate-gray: #cbd5e1;
            --dark-gray: #64748b;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #ffffff;
            font-family: var(--pixel-font);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* --- AUTH GRID OVERLAY --- */
        .register-container {
            width: 100%;
            max-width: 320px;
            padding: 20px;
            box-sizing: border-box;
        }

        .register-box {
            background: #000000;
            border: 3px solid var(--slate-gray);
            padding: 2rem 1.5rem;
            text-align: center;
            box-shadow: 4px 4px 0px rgba(255, 255, 255, 0.1);
        }

        .pixel-title {
            color: var(--retro-yellow);
            font-size: 0.95rem;
            margin-top: 0;
            margin-bottom: 1.5rem;
            letter-spacing: 1px;
        }

        .pixel-field {
            text-align: left;
            margin-bottom: 1.25rem;
        }

        .pixel-field label {
            display: block;
            font-size: 0.6rem;
            color: var(--dark-gray);
            margin-bottom: 0.4rem;
            font-weight: bold;
        }

        .pixel-field input {
            width: 100%;
            background: #111111;
            border: 2px solid var(--slate-gray);
            color: #ffffff;
            padding: 0.6rem;
            font-family: var(--pixel-font);
            font-size: 0.75rem;
            box-sizing: border-box;
            outline: none;
            text-transform: uppercase;
        }

        .pixel-field input:focus {
            border-color: var(--retro-yellow);
        }

        /* --- ARCADE BUTTON STYLE --- */
        .submit-btn {
            background: #000000;
            color: var(--slate-gray);
            border: 3px solid var(--slate-gray);
            width: 100%;
            padding: 0.75rem;
            cursor: pointer;
            font-family: var(--pixel-font);
            font-size: 0.7rem;
            font-weight: bold;
            box-shadow: 3px 3px 0px rgba(255,255,255,0.1);
            margin-top: 0.75rem;
            touch-action: manipulation;
            user-select: none;
        }

        @media (hover: hover) {
            .submit-btn:hover {
                border-color: var(--retro-yellow);
                color: var(--retro-yellow);
                box-shadow: 3px 3px 0px var(--retro-yellow);
            }
        }
    </style>
</head>
<body>

    <div class="register-container">
        <div class="register-box">
            <h2 class="pixel-title">[ CREATE PLAYER PROFILE ]</h2>
            
            <div class="pixel-field">
                <label>YOUR NAME</label>
                <input type="text" id="reg-player-name" placeholder="E.G., BIG AL" maxlength="12" autocomplete="off">
            </div>

            <div class="pixel-field">
                <label>COACH NAME</label>
                <input type="text" id="reg-coach-name" placeholder="E.G., SABAN" maxlength="12" autocomplete="off">
            </div>

            <button class="submit-btn" id="submit-btn" ontouchend="saveProfileAndRedirect(); event.preventDefault();" onclick="saveProfileAndRedirect()">
                START SEASON
            </button>
        </div>
    </div>

    <script>
        // Check local device memory instantly and run a silent cloud check
        async function checkExistingMemory() {
            const savedCoach = localStorage.getItem('my_coach_name');
            const savedPlayer = localStorage.getItem('my_player_name');

            if (savedCoach && savedPlayer) {
                let deviceUID = localStorage.getItem('my_device_uid');
                
                // If they have names saved but no device token (like you right now), make one!
                if (!deviceUID) {
                    deviceUID = 'dev_' + Math.random().toString(36).substring(2, 18);
                    localStorage.setItem('my_device_uid', deviceUID);
                }

                // Silently ensure this profile row exists up in Supabase before moving forward
                try {
                    await supabase.from('profiles').upsert({
                        device_uid: deviceUID,
                        player_name: savedPlayer.toUpperCase(),
                        coach_name: savedCoach.toUpperCase()
                    }, { onConflict: 'device_uid' });
                } catch(err) {
                    console.error("Background auto-sync holding error:", err);
                }

                window.location.replace("Leaderboard.html");
            }
        }

        // Run verification routine immediately upon script parse
        checkExistingMemory();

        // Process new form submissions, sync them locally and to the cloud database
        async function saveProfileAndRedirect() {
            const nameVal = document.getElementById('reg-player-name').value.trim().toUpperCase();
            const coachVal = document.getElementById('reg-coach-name').value.trim().toUpperCase();

            if (!nameVal || !coachVal) {
                alert("BOTH FIELDS REQUIRED FOR LEADERBOARD REGISTRATION!");
                return;
            }

            // Generate an immutable tracking hash token for this client instance
            const newDeviceUID = 'dev_' + Math.random().toString(36).substring(2, 18);

            // 1. Commit values immediately to cloud table pipeline
            const { error } = await supabase.from('profiles').insert([{
                device_uid: newDeviceUID,
                player_name: nameVal,
                coach_name: coachVal
            }]);

            if (error) {
                alert("DATABASE SYNC ERROR: " + error.message);
                return;
            }

            // 2. Lock elements down into system device memory safely
            localStorage.setItem('my_player_name', nameVal);
            localStorage.setItem('my_coach_name', coachVal);
            localStorage.setItem('my_device_uid', newDeviceUID);

            // Forward user to live scoreboard view hub
            window.location.href = "Leaderboard.html";
        }
    </script>
</body>
</html>
