<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Pick'em Leaderboard</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-canvas: #0f172a;       /* Deep slate arcade background */
            --bg-card: #1e293b;         /* Lighter card block */
            --retro-yellow: #facc15;    /* Rank 1 / Title neon */
            --retro-blue: #38bdf8;      /* Secondary highlights */
            --retro-green: #4ade80;     /* Positive momentum / High morale */
            --retro-red: #f87171;       /* Dead last / Danger zone */
            --pixel-font: 'Press Start 2P', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            background-color: var(--bg-canvas);
            color: #ffffff;
            font-family: Arial, sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1.5rem 1rem;
            overflow-y: auto; /* Allows scrolling down long leaderboards */
        }

        /* --- NAVIGATION HEADER --- */
        header {
            text-align: center;
            margin-bottom: 1.5rem;
            width: 100%;
            max-width: 500px;
            user-select: none;
        }

        .title {
            font-family: var(--pixel-font);
            font-size: 1.2rem;
            color: var(--retro-yellow);
            text-shadow: 3px 3px 0px #000;
            margin-bottom: 0.75rem;
        }

        /* Sub-menu navigation blocks mirroring Retro Bowl's hub design */
        .hub-nav {
            display: flex;
            background: #000000;
            border: 3px solid #ffffff;
            padding: 0.25rem;
            justify-content: space-between;
        }

        .nav-tab {
            font-family: var(--pixel-font);
            font-size: 0.65rem;
            padding: 0.5rem;
            color: #64748b;
            text-decoration: none;
        }

        .nav-tab.active {
            color: var(--retro-yellow);
        }

        /* --- LEADERBOARD LIST CONTAINER --- */
        .leaderboard-container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-bottom: 2rem;
        }

        /* --- THE FRANCHISE ROW COMPONENT --- */
        .rank-row {
            background-color: var(--bg-card);
            border: 4px solid #000000;
            box-shadow: 4px 4px 0px #000000;
            display: flex;
            align-items: center;
            padding: 0.75rem 1rem;
            position: relative;
        }

        /* Highlight Rank #1 */
        .rank-row.rank-first {
            border-color: var(--retro-yellow);
        }
        
        /* Highlight Rank Last */
        .rank-row.rank-last {
            border-color: var(--retro-red);
        }

        /* Position / Place Number Block */
        .position-badge {
            font-family: var(--pixel-font);
            font-size: 0.85rem;
            width: 35px;
            color: #cbd5e1;
        }
        .rank-first .position-badge { color: var(--retro-yellow); }
        .rank-last .position-badge { color: var(--retro-red); }

        /* Custom 8-bit Mini Avatar (CSS Built) */
        .avatar-box {
            width: 32px;
            height: 32px;
            background-color: #000000;
            border: 2px solid #ffffff;
            margin-right: 1rem;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 1px;
            padding: 2px;
        }
        .av-p { background-color: var(--avatar-color, #38bdf8); }
        .av-f { background-color: #ffedd5; } /* Face tone */

        /* Text Details Layout block */
        .meta-block {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
        }

        .coach-name {
            font-family: var(--pixel-font);
            font-size: 0.8rem;
            letter-spacing: -0.5px;
        }

        .stat-line {
            font-size: 0.75rem;
            color: #94a3b8;
            font-weight: bold;
        }

        /* --- FAN SUPPORT / RECORD METERS --- */
        .support-wrapper {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .meter-label {
            font-family: var(--pixel-font);
            font-size: 0.5rem;
            color: #64748b;
        }

        .support-meter {
            width: 80px;
            height: 8px;
            background-color: #000000;
            border: 1px solid #ffffff;
            position: relative;
        }

        .meter-fill {
            height: 100%;
            background-color: var(--retro-green);
            width: var(--percentage, 50%);
        }
        .rank-last .meter-fill {
            background-color: var(--retro-red);
        }

        /* Right Hand Scoring Frame */
        .score-box {
            text-align: right;
            margin-left: 0.5rem;
        }

        .total-points {
            font-family: var(--pixel-font);
            font-size: 0.9rem;
            color: var(--retro-green);
        }
        .rank-first .total-points {
            color: var(--retro-yellow);
        }

        .trend-indicator {
            font-size: 0.65rem;
            font-weight: bold;
            margin-top: 0.2rem;
        }
        .trend-up { color: var(--retro-green); }
        .trend-down { color: var(--retro-red); }
    </style>
</head>
<body>

    <!-- Hub Header System Layout -->
    <header>
        <h1 class="title">LEAGUE STANDINGS</h1>
        <nav class="hub-nav">
            <a href="index.html" class="nav-tab">PICKS</a>
            <a href="#" class="nav-tab active">STANDINGS</a>
            <a href="#" class="nav-tab">STATS</a>
        </nav>
    </header>

    <!-- Standings Leaderboard Block Stack -->
    <div class="leaderboard-container">

        <!-- Rank 1 Card (The Leader) -->
        <div class="rank-row rank-first">
            <div class="position-badge">01</div>
            
            <!-- Custom CSS Avatar Component -->
            <div class="avatar-box" style="--avatar-color: var(--retro-yellow);">
                <div class="av-p"></div><div class="av-p"></div><div class="av-p"></div><div class="av-p"></div>
                <div class="av-p"></div><div class="av-f"></div><div class="av-f"></div><div class="av-p"></div>
                <div class="av-p"></div><div class="av-f"></div><div class="av-f"></div><div class="av-p"></div>
                <div class="av-p"></div><div class="av-p"></div><div class="av-p"></div><div class="av-p"></div>
            </div>

            <div class="meta-block">
                <div class="coach-name">COACH ACE</div>
                <div class="support-wrapper">
                    <span class="meter-label">FAN SUPPORT</span>
                    <div class="support-meter">
                        <div class="meter-fill" style="--percentage: 95%;"></div>
                    </div>
                </div>
            </div>

            <div class="score-box">
                <div class="total-points">14-2</div>
                <div class="trend-indicator trend-up">▲ 1</div>
            </div>
        </div>

        <!-- Rank 2 Card -->
        <div class="rank-row">
            <div class="position-badge">02</div>
            
            <div class="avatar-box" style="--avatar-color: var(--retro-blue);">
                <div class="av-p"></div><div class="av-p"></div><div class="av-p"></div><div class="av-p"></div>
                <div class="av-p"></div><div class="av-f"></div><div class="av-f"></div><div class="av-p"></div>
                <div class="av-p"></div><div class="av-f"></div><div class="av-f"></div><div class="av-p"></div>
                <div class="av-p"></div><div class="av-p"></div><div class="av-p"></div><div class="av-p"></div>
            </div>

            <div class="meta-block">
                <div class="coach-name">COACH JON</div>
                <div class="support-wrapper">
                    <span class="meter-label">FAN SUPPORT</span>
                    <div class="support-meter">
                        <div class="meter-fill" style="--percentage: 75%;"></div>
                    </div>
                </div>
            </div>

            <div class="score-box">
                <div class="total-points">12-4</div>
                <div class="trend-indicator trend-down">▼ 1</div>
            </div>
        </div>

        <!-- Rank 3 Card -->
        <div class="rank-row">
            <div class="position-badge">03</div>
            
            <div class="avatar-box" style="--avatar-color: #a855f7;">
                <div class="av-p"></div><div class="av-p"></div><div class="av-p"></div><div class="av-p"></div>
                <div class="av-p"></div><div class="av-f"></div><div class="av-f"></div><div class="av-p"></div>
                <div class="av-p"></div><div class="av-f"></div><div class="av-f"></div><div class="av-p"></div>
                <div class="av-p"></div><div class="av-p"></div><div class="av-p"></div><div class="av-p"></div>
            </div>

            <div class="meta-block">
                <div class="coach-name">COACH SAM</div>
                <div class="support-wrapper">
                    <span class="meter-label">FAN SUPPORT</span>
                    <div class="support-meter">
                        <div class="meter-fill" style="--percentage: 60%;"></div>
                    </div>
                </div>
            </div>

            <div class="score-box">
                <div class="total-points">10-6</div>
                <div class="trend-indicator trend-up">▲ 2</div>
            </div>
        </div>

        <!-- Rank 4 Card (The Clown / Last Place) -->
        <div class="rank-row rank-last">
            <div class="position-badge">04</div>
            
            <div class="avatar-box" style="--avatar-color: var(--retro-red);">
                <div class="av-p"></div><div class="av-p"></div><div class="av-p"></div><div class="av-p"></div>
                <div class="av-p"></div><div class="av-f"></div><div class="av-f"></div><div class="av-p"></div>
                <div class="av-p"></div><div class="av-f"></div><div class="av-f"></div><div class="av-p"></div>
                <div class="av-p"></div><div class="av-p"></div><div class="av-p"></div><div class="av-p"></div>
            </div>

            <div class="meta-block">
                <div class="coach-name">COACH NOOB</div>
                <div class="support-wrapper">
                    <span class="meter-label">FAN SUPPORT</span>
                    <div class="support-meter">
                        <div class="meter-fill" style="--percentage: 15%;"></div>
                    </div>
                </div>
            </div>

            <div class="score-box">
                <div class="total-points" style="color: var(--retro-red);">4-12</div>
                <div class="trend-indicator trend-down">▼ 1</div>
            </div>
        </div>

    </div>

</body>
</html>
