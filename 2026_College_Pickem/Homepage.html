<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Bowl Swipe Pick'em</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-canvas: #0f172a;       
            --bg-card: #1e293b;         
            --retro-yellow: #facc15;    
            --retro-blue: #38bdf8;      
            --retro-green: #4ade80;     
            --pixel-font: 'Press Start 2P', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden; /* Stops mobile bouncing/scrolling completely */
            background-color: var(--bg-canvas);
        }

        body {
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1.5rem 1rem;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
            width: 100%;
            max-width: 400px;
            user-select: none;
        }

        .title {
            font-family: var(--pixel-font);
            font-size: 1.2rem;
            color: var(--retro-yellow);
            text-shadow: 3px 3px 0px #000;
            margin-bottom: 0.75rem;
        }

        .progress-bar {
            font-family: var(--pixel-font);
            font-size: 0.75rem;
            color: var(--retro-blue);
            background: #000000;
            padding: 0.5rem;
            border: 3px solid #ffffff;
        }

        .deck-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 380px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .matchup-card {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: var(--bg-card);
            border: 6px solid #000000;
            box-shadow: 6px 6px 0px #000000;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
            padding: 2rem 1.5rem;
            box-sizing: border-box;
            cursor: grab;
            user-select: none;
            touch-action: none; /* Tells browser not to scroll the page when touching the card */
            transform-origin: center bottom;
            z-index: 10;
        }

        /* Prevents inner elements from stealing touch focus while dragging */
        .matchup-card.dragging .teams-wrapper,
        .matchup-card.dragging .team-btn {
            pointer-events: none;
        }

        .matchup-number {
            font-family: var(--pixel-font);
            color: #64748b;
            font-size: 0.75rem;
        }

        .teams-wrapper {
            display: flex;
            width: 100%;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }

        .team-btn {
            flex: 1;
            background: #000000;
            border: 4px solid #ffffff;
            color: #ffffff;
            padding: 1.5rem 0.5rem;
            cursor: pointer;
            font-family: var(--pixel-font);
            font-size: 0.9rem;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.5);
        }

        .team-btn:hover {
            border-color: var(--retro-yellow);
            color: var(--retro-yellow);
        }

        .vs-divider {
            font-family: var(--pixel-font);
            font-size: 0.9rem;
            color: var(--retro-yellow);
        }

        .swipe-left {
            transform: translateX(-150vw) rotate(-25deg) !important;
            opacity: 0 !important;
        }

        .swipe-right {
            transform: translateX(150vw) rotate(25deg) !important;
            opacity: 0 !important;
        }

        .mobile-hint {
            display: none;
            font-family: var(--pixel-font);
            font-size: 0.55rem;
            color: #475569;
            margin-top: 2rem;
            text-align: center;
            line-height: 1.6;
        }

        @media (max-width: 600px) {
            .vs-divider { display: none; }
            .mobile-hint { display: block; }
        }
    </style>
</head>
<body>

    <header>
        <h1 class="title">RETRO SWIPER</h1>
        <div class="progress-bar" id="progress">GAME 1 OF 3</div>
    </header>

    <div class="deck-container" id="deck">
        
        <!-- Card 3 -->
        <div class="matchup-card" id="card-3" data-home="TB" data-away="DAL">
            <span class="matchup-number">MATCHUP 03</span>
            <div class="teams-wrapper">
                <button class="team-btn" onclick="handleBtnPick('card-3', 'home')">TB</button>
                <div class="vs-divider">VS</div>
                <button class="team-btn" onclick="handleBtnPick('card-3', 'away')">DAL</button>
            </div>
        </div>

        <!-- Card 2 -->
        <div class="matchup-card" id="card-2" data-home="KC" data-away="BUF">
            <span class="matchup-number">MATCHUP 02</span>
            <div class="teams-wrapper">
                <button class="team-btn" onclick="handleBtnPick('card-2', 'home')">KC</button>
                <div class="vs-divider">VS</div>
                <button class="team-btn" onclick="handleBtnPick('card-2', 'away')">BUF</button>
            </div>
        </div>

        <!-- Card 1 -->
        <div class="matchup-card" id="card-1" data-home="UGA" data-away="UF">
            <span class="matchup-number">MATCHUP 01</span>
            <div class="teams-wrapper">
                <button class="team-btn" onclick="handleBtnPick('card-1', 'home')">UGA</button>
                <div class="vs-divider">VS</div>
                <button class="team-btn" onclick="handleBtnPick('card-1', 'away')">UF</button>
            </div>
        </div>

    </div>

    <div class="mobile-hint">
        &lt; SWIPE LEFT FOR HOME | SWIPE RIGHT FOR AWAY &gt;
    </div>

    <script>
        let currentCardIndex = 1;
        const totalCards = 3;
        const savedPicks = {};

        let startX = 0;
        let startY = 0;
        let isDragging = false;

        function initSwipeEngine() {
            const cards = document.querySelectorAll('.matchup-card');
            
            cards.forEach(card => {
                // Touch Start
                card.addEventListener('touchstart', e => {
                    isDragging = true;
                    card.classList.add('dragging');
                    startX = e.touches[0].clientX;
                    startY = e.touches[0].clientY;
                    card.style.transition = 'none'; 
                }, { passive: true });

                // Touch Move (Dragging)
                card.addEventListener('touchmove', e => {
                    if (!isDragging) return;

                    const currentX = e.touches[0].clientX;
                    const deltaX = currentX - startX;
                    const rotationDegree = deltaX * 0.06; 
                    
                    // Move the card card position in real time
                    card.style.transform = `translateX(${deltaX}px) rotate(${rotationDegree}deg)`;
                }, { passive: true });

                // Touch End (Release)
                card.addEventListener('touchend', e => {
                    if (!isDragging) return;
                    isDragging = false;
                    card.classList.remove('dragging');
                    
                    card.style.transition = 'transform 0.3s ease, opacity 0.3s ease';

                    const endX = e.changedTouches[0].clientX;
                    const swipeDistance = endX - startX;
                    const threshold = 100; // Pixels needed to confirm selection

                    if (swipeDistance < -threshold) {
                        executePick(card, 'home', 'swipe-left');
                    } else if (swipeDistance > threshold) {
                        executePick(card, 'away', 'swipe-right');
                    } else {
                        // Snap back if let go early
                        card.style.transform = 'translateX(0px) rotate(0deg)';
                    }
                }, { passive: true });
            });
        }

        // Desktop Fallback
        function handleBtnPick(cardId, pickType) {
            const card = document.getElementById(cardId);
            const animationClass = pickType === 'home' ? 'swipe-left' : 'swipe-right';
            executePick(card, pickType, animationClass);
        }

        function executePick(cardElement, pickType, animationClass) {
            const cardId = cardElement.id;
            const chosenTeam = cardElement.getAttribute(`data-${pickType}`);
            
            savedPicks[cardId] = chosenTeam;
            console.log(`Saved: ${cardId} -> ${chosenTeam}`);

            cardElement.removeAttribute('style'); // Clear inline tracking positions
            cardElement.classList.add(animationClass);

            currentCardIndex++;
            renderProgressUpdates();
        }

        function renderProgressUpdates() {
            const display = document.getElementById('progress');
            if (currentCardIndex <= totalCards) {
                display.innerText = `GAME ${currentCardIndex} OF ${totalCards}`;
            } else {
                display.innerText = "ALL PICKS LOCKED!";
                display.style.color = "#4ade80";      /* Fixed CSS Variable Bug */
                display.style.borderColor = "#4ade80";/* Fixed CSS Variable Bug */
                setTimeout(() => {
                    alert("Boom! Selections recorded.");
                }, 400);
            }
        }

        initSwipeEngine();
    </script>
</body>
</html>
