<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Swipe Pick'em</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-canvas: #0f172a;
            --bg-card: #1e293b;
            --retro-yellow: #facc15;
            --retro-blue: #38bdf8;
            --retro-green: #4ade80;
            --pixel-font: 'Press Start 2P', monospace;
        }

        body {
            background-color: var(--bg-canvas);
            color: white;
            font-family: Arial, sans-serif;
            overflow: hidden; /* Prevents bounce scrolling during swipes */
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            padding: 1rem;
        }

        header {
            text-align: center;
            margin-top: 1rem;
            margin-bottom: 2rem;
        }

        .title {
            font-family: var(--pixel-font);
            font-size: 1.2rem;
            color: var(--retro-yellow);
            margin-bottom: 0.5rem;
        }

        .progress-bar {
            font-family: var(--pixel-font);
            font-size: 0.7rem;
            color: var(--retro-blue);
        }

        /* --- DECK & CARD STRUCTURE --- */
        .deck-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 380px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .matchup-card {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: var(--bg-card);
            border: 6px solid #000000;
            box-shadow: 6px 6px 0px #000000;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
            padding: 2rem;
            box-sizing: border-box;
            transition: transform 0.3s ease, opacity 0.3s ease;
            cursor: grab;
            user-select: none;
            touch-action: none; /* Critical for capturing clean mobile swipes */
        }

        /* Desktop Mode: Classic click layout */
        .teams-wrapper {
            display: flex;
            width: 100%;
            justify-content: space-between;
            gap: 1rem;
        }

        .team-btn {
            flex: 1;
            background: #000000;
            border: 3px solid #ffffff;
            color: white;
            padding: 1.5rem 0.5rem;
            cursor: pointer;
            font-family: var(--pixel-font);
            font-size: 0.9rem;
        }

        .team-btn:hover {
            border-color: var(--retro-yellow);
            color: var(--retro-yellow);
        }

        .vs-divider {
            font-family: var(--pixel-font);
            font-size: 1rem;
            color: var(--retro-yellow);
            align-self: center;
        }

        /* Swipe Animations */
        .swipe-left {
            transform: translateX(-150vw) rotate(-20deg) !important;
            opacity: 0;
        }

        .swipe-right {
            transform: translateX(150vw) rotate(20deg) !important;
            opacity: 0;
        }

        /* Responsive Mobile Layout adjustments */
        @media (max-width: 600px) {
            .vs-divider {
                display: none; /* Hide VS on mobile to focus on the swipe instruction */
            }
            .mobile-hint {
                display: block !important;
                font-family: var(--pixel-font);
                font-size: 0.6rem;
                color: #64748b;
                margin-top: 1.5rem;
                text-align: center;
                line-height: 1.5;
            }
        }

        .mobile-hint {
            display: none;
        }
    </style>
</head>
<body>

    <header>
        <div class="title">SWIPE PICKS</div>
        <div class="progress-bar" id="progress">GAME 1 OF 3</div>
    </header>

    <div class="deck-container" id="deck">
        <!-- Card 3 -->
        <div class="matchup-card" id="card-3" data-home="TB" data-away="DAL">
            <span style="font-family: var(--pixel-font); color:#64748b; font-size:0.8rem;">MATCHUP 3</span>
            <div class="teams-wrapper">
                <button class="team-btn" onclick="handleBtnPick('card-3', 'home')">TB</button>
                <div class="vs-divider">VS</div>
                <button class="team-btn" onclick="handleBtnPick('card-3', 'away')">DAL</button>
            </div>
        </div>

        <!-- Card 2 -->
        <div class="matchup-card" id="card-2" data-home="KC" data-away="BUF">
            <span style="font-family: var(--pixel-font); color:#64748b; font-size:0.8rem;">MATCHUP 2</span>
            <div class="teams-wrapper">
                <button class="team-btn" onclick="handleBtnPick('card-2', 'home')">KC</button>
                <div class="vs-divider">VS</div>
                <button class="team-btn" onclick="handleBtnPick('card-2', 'away')">BUF</button>
            </div>
        </div>

        <!-- Card 1 (Top of Stack) -->
        <div class="matchup-card" id="card-1" data-home="UGA" data-away="UF">
            <span style="font-family: var(--pixel-font); color:#64748b; font-size:0.8rem;">MATCHUP 1</span>
            <div class="teams-wrapper">
                <button class="team-btn" onclick="handleBtnPick('card-1', 'home')">UGA</button>
                <div class="vs-divider">VS</div>
                <button class="team-btn" onclick="handleBtnPick('card-1', 'away')">UF</button>
            </div>
        </div>
    </div>

    <div class="mobile-hint">&lt; SWIPE LEFT (HOME) | SWIPE RIGHT (AWAY) &gt;</div>

    <script>
        let currentCardIndex = 1;
        const totalCards = 3;
        const savedPicks = {};

        // Touch Tracking Coordinates
        let touchStartX = 0;
        let touchEndX = 0;

        function initSwipeMechanic() {
            const cards = document.querySelectorAll('.matchup-card');
            
            cards.forEach(card => {
                card.addEventListener('touchstart', e => {
                    touchStartX = e.changedTouches[0].screenX;
                }, { passive: true });

                card.addEventListener('touchend', e => {
                    touchEndX = e.changedTouches[0].screenX;
                    handleSwipeGesture(card);
                }, { passive: true });
            });
        }

        function handleSwipeGesture(cardElement) {
            const swipeDistance = touchEndX - touchStartX;
            const threshold = 60; // Minimum distance in pixels to trigger a swipe

            if (swipeDistance < -threshold) {
                // Swiped Left -> Choose Home Team
                executePick(cardElement, 'home', 'swipe-left');
            } else if (swipeDistance > threshold) {
                // Swiped Right -> Choose Away Team
                executePick(cardElement, 'away', 'swipe-right');
            }
        }

        // Desktop Fallback Click Logic
        function handleBtnPick(cardId, pickType) {
            const card = document.getElementById(cardId);
            const animationClass = pickType === 'home' ? 'swipe-left' : 'swipe-right';
            executePick(card, pickType, animationClass);
        }

        function executePick(cardElement, pickType, animationClass) {
            const cardId = cardElement.id;
            const chosenTeam = cardElement.getAttribute(`data-${pickType}`);
            
            // Save selection
            savedPicks[cardId] = chosenTeam;
            console.log(`Saved Pick for ${cardId}: ${chosenTeam}`);

            // Trigger Arcade CSS Flight Animation
            cardElement.classList.add(animationClass);

            // Increment Progress
            currentCardIndex++;
            updateProgressText();
        }

        function updateProgressText() {
            const progressDisplay = document.getElementById('progress');
            if (currentCardIndex <= totalCards) {
                progressDisplay.innerText = `GAME ${currentCardIndex} OF ${totalCards}`;
            } else {
                progressDisplay.innerText = "ALL PICKS LOCKED IN!";
                progressDisplay.style.color = var(--retro-green);
                alert("Boom! All selections recorded. Saving directly to backend...");
            }
        }

        // Initialize script logic
        initSwipeMechanic();
    </script>
</body>
</html>
