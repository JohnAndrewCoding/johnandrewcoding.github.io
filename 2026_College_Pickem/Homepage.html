        .rank-row {

        }
        .rank-first .position-badge { color: var(--retro-yellow); }
        .rank-last .position-badge { color: var(--retro-red); }

        .avatar-box {
            width: 32px;
            height: 32px;
            background-color: #000000;
            border: 2px solid #ffffff;
            margin-right: 1rem;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 1px;
            padding: 2px;
        }
        .av-p { background-color: var(--avatar-color, #38bdf8); }
        .av-f { background-color: #ffedd5; }

        .meta-block {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
        }

        .coach-name {
            font-family: var(--pixel-font);
            font-size: 0.8rem;
            letter-spacing: -0.5px;
        }

        .support-wrapper {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .meter-label {
            font-family: var(--pixel-font);
            font-size: 0.5rem;
            color: #64748b;
        }

        .support-meter {
            width: 80px;
            height: 8px;
            background-color: #000000;
            border: 1px solid #ffffff;
            position: relative;
        }

        .meter-fill {
            height: 100%;
            background-color: var(--retro-green);
            width: var(--percentage, 50%);
        }
        .rank-last .meter-fill { background-color: var(--retro-red); }

        .score-box {
            text-align: right;
            margin-left: 0.5rem;
        }

        .total-points {
            font-family: var(--pixel-font);
            font-size: 0.9rem;
            color: var(--retro-green);
        }
        .rank-first .total-points { color: var(--retro-yellow); }

        .trend-indicator {
            font-size: 0.65rem;
            font-weight: bold;
            margin-top: 0.2rem;
        }
        .trend-up { color: var(--retro-green); }
        .trend-down { color: var(--retro-red); }

        }

            transform: translate(3px, 3px);
        }
    </style>
</head>

    <script>
        const NTFY_TOPIC = "cfb-pickem-boys-2026-9831a";

// 1. Register the Service Worker smoothly using the local folder path
if ('serviceWorker' in navigator && 'PushManager' in window) {
    navigator.serviceWorker.register('sw.js', { scope: './' })
        .then(reg => console.log('Service Worker scoped locally.'))
        .catch(err => console.error('Worker registration failed:', err));
}

// 2. Public VAPID key provided by ntfy for app-free web push browser integration
function urlBase64ToUint8Array(base64String) {
    const padding = '='.repeat((4 - base64String.length % 4) % 4);
    const base64 = (base64String + padding).replace(/\-/g, '+').replace(/_/g, '/');
    const rawData = window.atob(base64);
    const outputArray = new Uint8Array(rawData.length);
    for (let i = 0; i < rawData.length; ++i) {
        outputArray[i] = rawData.charCodeAt(i);
    }
    return outputArray;
}

async function setupNativeAlerts() {
    if (!("Notification" in window)) {
        alert("Launch this app from your iPhone Home Screen icon to enable alerts!");
        return;
    }

    const permission = await Notification.requestPermission();
    if (permission === "granted") {
        try {
            const registration = await navigator.serviceWorker.ready;
            
            // Request a secure, unique device token from Apple's push servers via ntfy's public key
            const subscription = await registration.pushManager.subscribe({
                userVisibleOnly: true,
                applicationServerKey: urlBase64ToUint8Array('BNoR69K9Rsn9CDZNo0ee-ST9S8YgN9SgD6A3509sD-A=')
            });

            // Hand your phone's secret token directly to your ntfy topic channel
            await fetch(`https://ntfy.sh/${NTFY_TOPIC}/webpush`, {
                method: 'POST',
                body: JSON.stringify(subscription),
                headers: { 'Content-Type': 'application/json' }
            });

            alert("Main screen alerts armed! System linked.");
            const btn = document.getElementById("enable-alerts-btn");
            btn.innerText = "ALERTS CONNECTED ✅";
            btn.style.backgroundColor = "var(--retro-green)";
            btn.style.color = "#000000";
        } catch (e) {
            alert("Connection error: " + e.message);
            console.error(e);
        }
    } else {
        alert("Permission denied. Check iOS Settings -> Notifications -> Safari.");
    }
}

document.getElementById("enable-alerts-btn").addEventListener("click", setupNativeAlerts);
