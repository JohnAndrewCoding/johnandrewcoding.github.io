<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Bowl Swipe Pick'em</title>
    <a href="Homepage.html"><button style="position: absolute; top: 10px; left: 10px; z-index: 100;">Homepage</button></a>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-canvas: #0f172a;       
            --bg-card: #1e293b;         
            --retro-yellow: #facc15;    
            --retro-blue: #38bdf8;      
            --retro-green: #4ade80;     
            --pixel-font: 'Press Start 2P', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden; 
            background-color: var(--bg-canvas);
        }

        body {
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1.5rem 1rem;
        }

        header {
            text-align: center;
            margin-bottom: 1rem;
            width: 100%;
            max-width: 400px;
            user-select: none;
        }

        .title {
            font-family: var(--pixel-font);
            font-size: 1.2rem;
            color: var(--retro-yellow);
            text-shadow: 3px 3px 0px #000;
            margin-bottom: 0.75rem;
        }

        .week-controls {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 400px;
            margin-bottom: 1rem;
            font-family: var(--pixel-font);
            font-size: 0.75rem;
            user-select: none;
        }

        .week-btn {
            background: #000000;
            color: #ffffff;
            border: 3px solid #ffffff;
            padding: 0.5rem 0.75rem;
            cursor: pointer;
            font-family: var(--pixel-font);
            font-size: 0.75rem;
            box-shadow: 3px 3px 0px rgba(0,0,0,0.5);
        }

        /* Change this block */
@media (hover: hover) {
    .week-btn:hover {
        border-color: var(--retro-yellow);
        color: var(--retro-yellow);
    }
}

        .week-display {
            color: var(--retro-yellow);
            align-self: center;
            text-shadow: 2px 2px 0px #000;
        }

        .progress-bar {
            font-family: var(--pixel-font);
            font-size: 0.75rem;
            color: var(--retro-blue);
            background: #000000;
            padding: 0.5rem;
            border: 3px solid #ffffff;
        }

        .deck-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 390px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .matchup-card {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: var(--bg-card);
            border: 6px solid #000000;
            box-shadow: 6px 6px 0px #000000;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 1.25rem;
            box-sizing: border-box;
            cursor: grab;
            user-select: none;
            touch-action: none; 
            transform-origin: center bottom;
            z-index: 10;
            visibility: hidden; 
        }

        .matchup-card.active-stack {
            visibility: visible;
        }

        .matchup-card.dragging .teams-wrapper,
        .matchup-card.dragging .team-btn,
        .matchup-card.dragging .team-display-block {
            pointer-events: none;
        }

        .matchup-number {
            text-align: center;
            font-family: var(--pixel-font);
            color: #64748b;
            font-size: 0.65rem;
            line-height: 1.4;
        }

        .teams-wrapper {
            display: flex;
            width: 100%;
            justify-content: space-between;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .team-display-block {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .team-btn {
            width: 100%;
            background: #000000;
            border: 4px solid #ffffff;
            color: #ffffff;
            padding: 0.85rem 0.25rem;
            cursor: pointer;
            font-family: var(--pixel-font);
            font-size: 0.75rem;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.5);
            word-wrap: break-word;
        }

        /* Change this block */
@media (hover: hover) {
    .team-btn:hover {
        border-color: var(--retro-yellow);
        color: var(--retro-yellow);
    }
}

        .team-record {
            font-family: var(--pixel-font);
            font-size: 0.55rem;
            color: #94a3b8;
        }

        .vs-divider {
            font-family: var(--pixel-font);
            font-size: 0.8rem;
            color: var(--retro-yellow);
            margin-top: 2rem; 
        }

        /* --- INFO BAR FOR ODDS/SPREAD --- */
        .game-info-bar {
            width: 100%;
            background: #000000;
            border: 2px dashed #475569;
            padding: 0.4rem;
            text-align: center;
            font-family: var(--pixel-font);
            font-size: 0.6rem;
            color: var(--retro-blue);
            margin-top: 0.5rem;
        }

        .helmet-icon {
            width: 48px;
            height: 40px;
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            grid-template-rows: repeat(5, 1fr);
            gap: 1px;
        }
        .pixel { background-color: transparent; }
        .p-fill { background-color: var(--team-color, #ffffff); } 
        .p-face { background-color: #cbd5e1; }          
        .p-dark { background-color: #000000; }          

        .swipe-left {
            transform: translateX(-150vw) rotate(-25deg) !important;
            opacity: 0 !important;
            transition: transform 0.4s ease, opacity 0.4s ease !important;
        }

        .swipe-right {
            transform: translateX(150vw) rotate(25deg) !important;
            opacity: 0 !important;
            transition: transform 0.4s ease, opacity 0.4s ease !important;
        }

        .mobile-hint {
            display: none;
            font-family: var(--pixel-font);
            font-size: 0.55rem;
            color: #475569;
            margin-top: 1.5rem;
            text-align: center;
            line-height: 1.6;
        }

        .retro-toast {
            position: fixed;
            bottom: 12%; 
            background-color: #000000;
            border: 4px solid var(--retro-yellow);
            padding: 1rem;
            font-family: var(--pixel-font);
            font-size: 0.75rem;
            color: #ffffff;
            text-align: center;
            box-shadow: 4px 4px 0px rgba(0, 0, 0, 0.7);
            z-index: 100; 
            opacity: 0;
            transform: translateY(20px);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.2s ease;
            pointer-events: none; 
        }

        .retro-toast.show {
            opacity: 1;
            transform: translateY(0px);
        }
        /* --- UNDO BUTTON STYLE --- */
        .undo-container {
            width: 100%;
            max-width: 400px;
            display: flex;
            justify-content: center;
            margin-top: 1rem;
            z-index: 100;
        }

        .undo-btn {
            background: #000000;
            color: #cbd5e1;
            border: 3px solid #cbd5e1;
            padding: 0.5rem 1rem;
            cursor: pointer;
            font-family: var(--pixel-font);
            font-size: 0.65rem;
            box-shadow: 3px 3px 0px rgba(0,0,0,0.5);
            display: none; /* Hidden by default, shown when a pick is made */
        }

       /* Change this block */
@media (hover: hover) {
    .undo-btn:hover {
        border-color: var(--retro-yellow);
        color: var(--retro-yellow);
    }
}

        @media (max-width: 600px) {
            .vs-divider { display: none; }
            .mobile-hint { display: block; }
        }
    </style>
</head>
<body>

    <header>
        <h1 class="title">RETRO SWIPER</h1>
        <div class="progress-bar" id="progress">LOADING SEASON...</div>
    </header>

    <div class="week-controls">
        <button class="week-btn" id="prev-week-btn" onclick="changeWeek(-1)">&lt; PREV</button>
        <span class="week-display" id="week-display">WEEK 01</span>
        <button class="week-btn" id="next-week-btn" onclick="changeWeek(1)">NEXT &gt;</button>
    </div>

    <div class="retro-toast" id="toast">PICKED: UGA</div>

    <div class="deck-container" id="deck">
        </div>
   <!-- Change this container in your HTML -->
<div class="undo-container">
    <button class="undo-btn" id="undo-btn" ontouchend="undoLastPick(); event.preventDefault();" onclick="undoLastPick()">[ ] UNDO LAST PICK</button>
</div>
    <div class="mobile-hint">
        &lt; SWIPE LEFT FOR HOME | SWIPE RIGHT FOR AWAY &gt;
    </div>

    <script>
        let currentWeek = 1; 
        let currentCardIndex = 1;
        let totalCards = 0;
        const savedPicks = {};
        let gamesData = [];

        let startX = 0;
        let startY = 0;
        let isDragging = false;
        let toastTimeout = null; 

        const helmetHTML = (color) => `
            <div class="helmet-icon" style="--team-color: #${color};">
                <div class="pixel p-fill"></div><div class="pixel p-fill"></div><div class="pixel p-fill"></div><div class="pixel p-fill"></div><div class="pixel"></div><div class="pixel"></div>
                <div class="pixel p-fill"></div><div class="pixel p-fill"></div><div class="pixel p-fill"></div><div class="pixel p-fill"></div><div class="pixel p-fill"></div><div class="pixel"></div>
                <div class="pixel p-fill"></div><div class="pixel p-dark"></div><div class="pixel p-fill"></div><div class="pixel p-face"></div><div class="pixel p-face"></div><div class="pixel p-face"></div>
                <div class="pixel p-fill"></div><div class="pixel p-fill"></div><div class="pixel p-fill"></div><div class="pixel p-dark"></div><div class="pixel"></div><div class="pixel p-face"></div>
                <div class="pixel p-fill"></div><div class="pixel p-fill"></div><div class="pixel p-dark"></div><div class="pixel p-dark"></div><div class="pixel p-face"></div><div class="pixel p-face"></div>
            </div>`;

        async function loadWeekGames() {
            const deck = document.getElementById('deck');
            const progressDisplay = document.getElementById('progress');

            currentCardIndex = 1;
            progressDisplay.removeAttribute('style');
            progressDisplay.innerText = "LOADING MATCHUPS...";
            document.getElementById('undo-btn').style.display = 'none';

            try {
                const response = await fetch(`https://site.api.espn.com/apis/site/v2/sports/football/college-football/scoreboard?groups=80&week=${currentWeek}`);
                const data = await response.json();
                
                if (!data.events || data.events.length === 0) {
                    progressDisplay.innerText = "NO GAMES FOUND";
                    deck.innerHTML = ''; 
                    return;
                }

                gamesData = data.events;
                totalCards = gamesData.length;
                deck.innerHTML = ''; 

                gamesData.forEach((gameEvent, index) => {
                    const matchupNum = index + 1;
                    const competition = gameEvent.competitions[0];
                    
                    const homeTeamData = competition.competitors.find(c => c.homeAway === 'home');
                    const awayTeamData = competition.competitors.find(c => c.homeAway === 'away');

                    // Extract spreads/odds safely
                    let pointSpread = "LINE: N/A";
                    if (competition.odds && competition.odds.length > 0 && competition.odds[0].details) {
                        pointSpread = `SPREAD: ${competition.odds[0].details.toUpperCase()}`;
                    }

                    // Extract team records safely
                    const homeRecord = (homeTeamData.records && homeTeamData.records.length > 0) ? homeTeamData.records[0].summary : "0-0";
                    const awayRecord = (awayTeamData.records && awayTeamData.records.length > 0) ? awayTeamData.records[0].summary : "0-0";

                    const home = {
                        id: homeTeamData.team.id,
                        name: homeTeamData.team.abbreviation || homeTeamData.team.shortDisplayName,
                        color: homeTeamData.team.color || 'dc2626',
                        record: homeRecord
                    };

                    const away = {
                        id: awayTeamData.team.id,
                        name: awayTeamData.team.abbreviation || awayTeamData.team.shortDisplayName,
                        color: awayTeamData.team.color || '1e3a8a',
                        record: awayRecord
                    };
                    // Extract Kickoff Date and Time safely
        const kickoffDate = new Date(gameEvent.date);
        const formattedTime = kickoffDate.toLocaleDateString('en-US', { month: 'numeric', day: 'numeric' }) + 
                      " @ " + 
                      kickoffDate.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });

// Extract Venue details safely
        const venue = competition.venue || {};
        const stadiumName = venue.fullName ? venue.fullName.toUpperCase() : "UNKNOWN STADIUM";
        const stadiumLoc = (venue.address && venue.address.city && venue.address.state) 
    ? `${venue.address.city}, ${venue.address.state}`.toUpperCase() 
    : "LOCATION N/A";

                    const card = document.createElement('div');
                    card.className = 'matchup-card';
                    card.id = `card-${matchupNum}`;
                    card.setAttribute('data-home', home.name);
                    card.setAttribute('data-away', away.name);
                    
                    card.style.zIndex = totalCards - index;
                        card.innerHTML = `
    <span class="matchup-number" style="font-size: 0.55rem; color: var(--retro-yellow);">
        ${formattedTime}<br>
        <small style="font-size: 0.5rem; color: #64748b; line-height: 1.5;">
            ${stadiumName}<br>${stadiumLoc}
        </small>
    </span>
                         <div class="teams-wrapper">
                            <div class="team-display-block">
                                ${helmetHTML(home.color)}
                                <button class="team-btn" onclick="handleBtnPick('card-${matchupNum}', 'home')">${home.name}</button>
                                <span class="team-record">REC: ${home.record}</span>
                            </div>
                            <div class="vs-divider">VS</div>
                            <div class="team-display-block">
                                ${helmetHTML(away.color)}
                                <button class="team-btn" onclick="handleBtnPick('card-${matchupNum}', 'away')">${away.name}</button>
                                <span class="team-record">REC: ${away.record}</span>
                            </div>
                        </div>

                        <div class="game-info-bar">${pointSpread}</div>
                    `;

                    deck.appendChild(card);
                });

                updateActiveCardVisibility();
                renderProgressUpdates();
                initSwipeEngine();

            } catch (error) {
                console.error("Failed to map ESPN payload structure:", error);
                progressDisplay.innerText = "API CONNECTION ERROR";
            }
        }

        function changeWeek(direction) {
            currentWeek += direction;
            if (currentWeek < 1) {
                currentWeek = 1;
                return;
            }
            document.getElementById('week-display').innerText = `WEEK ${String(currentWeek).padStart(2, '0')}`;
            document.getElementById('deck').innerHTML = '';
            loadWeekGames();
        }

        function updateActiveCardVisibility() {
            document.querySelectorAll('.matchup-card').forEach(card => {
                const cardIdNum = parseInt(card.id.split('-')[1]);
                if (cardIdNum === currentCardIndex || cardIdNum === currentCardIndex + 1) {
                    card.classList.add('active-stack');
                } else {
                    card.classList.remove('active-stack');
                }
            });
        }

        function initSwipeEngine() {
            const cards = document.querySelectorAll('.matchup-card');
            
            cards.forEach(card => {
                card.addEventListener('touchstart', e => {
                    const cardIdNum = parseInt(card.id.split('-')[1]);
                    if (cardIdNum !== currentCardIndex) return; 

                    isDragging = true;
                    card.classList.add('dragging');
                    startX = e.touches[0].clientX;
                    startY = e.touches[0].clientY;
                    card.style.transition = 'none'; 
                }, { passive: true });

                card.addEventListener('touchmove', e => {
                    if (!isDragging) return;

                    const currentX = e.touches[0].clientX;
                    const deltaX = currentX - startX;
                    const rotationDegree = deltaX * 0.06; 
                    
                    card.style.transform = `translateX(${deltaX}px) rotate(${rotationDegree}deg)`;
                }, { passive: true });

                card.addEventListener('touchend', e => {
                    if (!isDragging) return;
                    isDragging = false;
                    card.classList.remove('dragging');
                    
                    card.style.transition = 'transform 0.3s ease, opacity 0.3s ease';

                    const endX = e.changedTouches[0].clientX;
                    const swipeDistance = endX - startX;
                    const threshold = 100; 

                    if (swipeDistance < -threshold) {
                        executePick(card, 'home', 'swipe-left');
                    } else if (swipeDistance > threshold) {
                        executePick(card, 'away', 'swipe-right');
                    } else {
                        card.style.transform = 'translateX(0px) rotate(0deg)';
                    }
                }, { passive: true });
            });
        }

        function handleBtnPick(cardId, pickType) {
            const card = document.getElementById(cardId);
            const cardIdNum = parseInt(cardId.split('-')[1]);
            
            if (cardIdNum !== currentCardIndex) return;

            const animationClass = pickType === 'home' ? 'swipe-left' : 'swipe-right';
            executePick(card, pickType, animationClass);
        }

        function executePick(cardElement, pickType, animationClass) {
            const cardId = cardElement.id;
            const chosenTeam = cardElement.getAttribute(`data-${pickType}`);
            
            if(!savedPicks[`week-${currentWeek}`]) {
                savedPicks[`week-${currentWeek}`] = {};
            }
            savedPicks[`week-${currentWeek}`][cardId] = chosenTeam;

            triggerToastNotification(chosenTeam);

            cardElement.removeAttribute('style'); 
            cardElement.classList.add(animationClass);

            currentCardIndex++;
            updateActiveCardVisibility();
            renderProgressUpdates();
            document.getElementById('undo-btn').style.display = 'block';
        }

        function triggerToastNotification(teamName) {
            const toast = document.getElementById('toast');
            clearTimeout(toastTimeout);
            toast.innerText = `LOCKED: ${teamName}`;
            toast.classList.add('show');
            
            toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 1200);
        }

        function renderProgressUpdates() {
            const display = document.getElementById('progress');
            if (currentCardIndex <= totalCards) {
                display.innerText = `GAME ${currentCardIndex} OF ${totalCards}`;
            } else {
                display.innerText = "ALL PICKS LOCKED!";
                display.style.color = "var(--retro-green)";      
                display.style.borderColor = "var(--retro-green)";
            }
        }
        function undoLastPick() {
            // Check if we are at the first card (nothing to undo)
            if (currentCardIndex <= 1) return;

            // Step back one card index
            currentCardIndex--;

            // Find the targeted card element
            const previousCard = document.getElementById(`card-${currentCardIndex}`);
            if (!previousCard) return;

            // Remove saved pick entry from storage
            if (savedPicks[`week-${currentWeek}`]) {
                delete savedPicks[`week-${currentWeek}`][`card-${currentCardIndex}`];
            }

            // Reset animation positioning classes completely
            previousCard.className = 'matchup-card';
            previousCard.removeAttribute('style');

            // Force z-index realignment to place it perfectly on top of the pile
            previousCard.style.zIndex = totalCards - (currentCardIndex - 1);

            // Re-sync visual components
            updateActiveCardVisibility();
            renderProgressUpdates();

            // Hide the undo button if we rolled back all the way to the first game
            if (currentCardIndex === 1) {
                document.getElementById('undo-btn').style.display = 'none';
            }
            
            // Temporary confirmation alert
            triggerToastNotification("PICK REMOVED");
        }

        window.addEventListener('DOMContentLoaded', loadWeekGames);
    </script>
</body>
</html>
