<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Bowl Swipe Pick'em</title>
    <a href="Homepage.html"><button style="position: absolute; top: 10px; left: 10px; z-index: 100;">Homepage</button></a>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-canvas: #0f172a;       
            --bg-card: #1e293b;         
            --retro-yellow: #facc15;    
            --retro-blue: #38bdf8;      
            --retro-green: #4ade80;     
            --pixel-font: 'Press Start 2P', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden; 
            background-color: var(--bg-canvas);
        }

        body {
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1.5rem 1rem;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
            width: 100%;
            max-width: 400px;
            user-select: none;
        }

        .title {
            font-family: var(--pixel-font);
            font-size: 1.2rem;
            color: var(--retro-yellow);
            text-shadow: 3px 3px 0px #000;
            margin-bottom: 0.75rem;
        }

        .progress-bar {
            font-family: var(--pixel-font);
            font-size: 0.75rem;
            color: var(--retro-blue);
            background: #000000;
            padding: 0.5rem;
            border: 3px solid #ffffff;
        }

        .deck-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 380px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .matchup-card {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: var(--bg-card);
            border: 6px solid #000000;
            box-shadow: 6px 6px 0px #000000;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
            padding: 2rem 1.5rem;
            box-sizing: border-box;
            cursor: grab;
            user-select: none;
            touch-action: none; 
            transform-origin: center bottom;
            z-index: 10;
            visibility: hidden; /* Hidden until stack index sorted */
        }

        .matchup-card.active-stack {
            visibility: visible;
        }

        .matchup-card.dragging .teams-wrapper,
        .matchup-card.dragging .team-btn,
        .matchup-card.dragging .team-display-block {
            pointer-events: none;
        }

        .matchup-number {
            text-align: center;
            font-family: var(--pixel-font);
            color: #64748b;
            font-size: 0.65rem;
            line-height: 1.4;
        }

        .teams-wrapper {
            display: flex;
            width: 100%;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }

        .team-display-block {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.25rem;
        }

        .team-btn {
            width: 100%;
            background: #000000;
            border: 4px solid #ffffff;
            color: #ffffff;
            padding: 1rem 0.25rem;
            cursor: pointer;
            font-family: var(--pixel-font);
            font-size: 0.75rem;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.5);
            word-wrap: break-word;
        }

        .team-btn:hover {
            border-color: var(--retro-yellow);
            color: var(--retro-yellow);
        }

        .vs-divider {
            font-family: var(--pixel-font);
            font-size: 0.9rem;
            color: var(--retro-yellow);
            margin-top: 3.5rem; 
        }

        /* --- THE 8-BIT GRID HELMET SPRITE --- */
        .helmet-icon {
            width: 48px;
            height: 40px;
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            grid-template-rows: repeat(5, 1fr);
            gap: 1px;
        }
        .pixel { background-color: transparent; }
        .p-fill { background-color: var(--team-color, #ffffff); } 
        .p-face { background-color: #cbd5e1; }          
        .p-dark { background-color: #000000; }          

        .swipe-left {
            transform: translateX(-150vw) rotate(-25deg) !important;
            opacity: 0 !important;
            transition: transform 0.4s ease, opacity 0.4s ease !important;
        }

        .swipe-right {
            transform: translateX(150vw) rotate(25deg) !important;
            opacity: 0 !important;
            transition: transform 0.4s ease, opacity 0.4s ease !important;
        }

        .mobile-hint {
            display: none;
            font-family: var(--pixel-font);
            font-size: 0.55rem;
            color: #475569;
            margin-top: 2rem;
            text-align: center;
            line-height: 1.6;
        }

        .retro-toast {
            position: fixed;
            bottom: 12%; 
            background-color: #000000;
            border: 4px solid var(--retro-yellow);
            padding: 1rem;
            font-family: var(--pixel-font);
            font-size: 0.75rem;
            color: #ffffff;
            text-align: center;
            box-shadow: 4px 4px 0px rgba(0, 0, 0, 0.7);
            z-index: 100; 
            opacity: 0;
            transform: translateY(20px);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.2s ease;
            pointer-events: none; 
        }

        .retro-toast.show {
            opacity: 1;
            transform: translateY(0px);
        }

        @media (max-width: 600px) {
            .vs-divider { display: none; }
            .mobile-hint { display: block; }
        }
    </style>
</head>
<body>

    <header>
        <h1 class="title">RETRO SWIPER</h1>
        <div class="progress-bar" id="progress">LOADING SEASON...</div>
    </header>

    <div class="retro-toast" id="toast">PICKED: UGA</div>

    <div class="deck-container" id="deck">
        <!-- Matchup cards render dynamically here -->
    </div>

    <div class="mobile-hint">
        &lt; SWIPE LEFT FOR HOME | SWIPE RIGHT FOR AWAY &gt;
    </div>

    <script>
        let currentCardIndex = 1;
        let totalCards = 0;
        const savedPicks = {};
        let gamesData = [];

        let startX = 0;
        let startY = 0;
        let isDragging = false;
        let toastTimeout = null; 

        // 8-Bit Pixel Helmet Template Markup Helper
        const helmetHTML = (color) => `
            <div class="helmet-icon" style="--team-color: #${color};">
                <div class="pixel p-fill"></div><div class="pixel p-fill"></div><div class="pixel p-fill"></div><div class="pixel p-fill"></div><div class="pixel"></div><div class="pixel"></div>
                <div class="pixel p-fill"></div><div class="pixel p-fill"></div><div class="pixel p-fill"></div><div class="pixel p-fill"></div><div class="pixel p-fill"></div><div class="pixel"></div>
                <div class="pixel p-fill"></div><div class="pixel p-dark"></div><div class="pixel p-fill"></div><div class="pixel p-face"></div><div class="pixel p-face"></div><div class="pixel p-face"></div>
                <div class="pixel p-fill"></div><div class="pixel p-fill"></div><div class="pixel p-fill"></div><div class="pixel p-dark"></div><div class="pixel"></div><div class="pixel p-face"></div>
                <div class="pixel p-fill"></div><div class="pixel p-fill"></div><div class="pixel p-dark"></div><div class="pixel p-dark"></div><div class="pixel p-face"></div><div class="pixel p-face"></div>
            </div>`;

        // Async Load Week 1 Matchups via ESPN API
        async function loadWeekOneGames() {
            const deck = document.getElementById('deck');
            const progressDisplay = document.getElementById('progress');

            try {
                // groups=80 isolates all relevant FBS level divisions, week=1 targets season openers
                const response = await fetch('https://site.api.espn.com/apis/site/v2/sports/football/college-football/scoreboard?groups=80&week=1');
                const data = await response.json();
                
                if (!data.events || data.events.length === 0) {
                    progressDisplay.innerText = "NO GAMES FOUND";
                    return;
                }

                gamesData = data.events;
                totalCards = gamesData.length;
                deck.innerHTML = ''; // Clean canvas

                // Render components inside out (Card 1 goes on top, so we reverse append or manage via z-indexing)
                gamesData.forEach((gameEvent, index) => {
                    const matchupNum = index + 1;
                    const competition = gameEvent.competitions[0];
                    
                    // ESPN references Home/Away parameters via structural array indices
                    const homeTeamData = competition.competitors.find(c => c.homeAway === 'home');
                    const awayTeamData = competition.competitors.find(c => c.homeAway === 'away');

                    const home = {
                        id: homeTeamData.team.id,
                        name: homeTeamData.team.abbreviation || homeTeamData.team.shortDisplayName,
                        color: homeTeamData.team.color || 'dc2626'
                    };

                    const away = {
                        id: awayTeamData.team.id,
                        name: awayTeamData.team.abbreviation || awayTeamData.team.shortDisplayName,
                        color: awayTeamData.team.color || '1e3a8a'
                    };

                    const card = document.createElement('div');
                    card.className = 'matchup-card';
                    card.id = `card-${matchupNum}`;
                    card.setAttribute('data-home', home.name);
                    card.setAttribute('data-away', away.name);
                    
                    // Invert stacking mechanics so Matchup 1 rests visibly on top
                    card.style.zIndex = totalCards - index;

                    card.innerHTML = `
                        <span class="matchup-number">MATCHUP ${String(matchupNum).padStart(2, '0')}<br><small style="font-size:9px; color:#475569;">${gameEvent.name}</small></span>
                        <div class="teams-wrapper">
                            <div class="team-display-block">
                                ${helmetHTML(home.color)}
                                <button class="team-btn" onclick="handleBtnPick('card-${matchupNum}', 'home')">${home.name}</button>
                            </div>
                            <div class="vs-divider">VS</div>
                            <div class="team-display-block">
                                ${helmetHTML(away.color)}
                                <button class="team-btn" onclick="handleBtnPick('card-${matchupNum}', 'away')">${away.name}</button>
                            </div>
                        </div>
                    `;

                    deck.appendChild(card);
                });

                // Set initial visual structures
                updateActiveCardVisibility();
                renderProgressUpdates();
                initSwipeEngine();

            } catch (error) {
                console.error("Failed to map ESPN payload structure:", error);
                progressDisplay.innerText = "API CONNECTION ERROR";
            }
        }

        function updateActiveCardVisibility() {
            // Keep the current active card and the immediate next card visible for slick layout performance
            document.querySelectorAll('.matchup-card').forEach(card => {
                const cardIdNum = parseInt(card.id.split('-')[1]);
                if (cardIdNum === currentCardIndex || cardIdNum === currentCardIndex + 1) {
                    card.classList.add('active-stack');
                } else {
                    card.classList.remove('active-stack');
                }
            });
        }

        function initSwipeEngine() {
            const cards = document.querySelectorAll('.matchup-card');
            
            cards.forEach(card => {
                // Ensure touch mechanics bind correctly to the runtime elements
                card.addEventListener('touchstart', e => {
                    const cardIdNum = parseInt(card.id.split('-')[1]);
                    if (cardIdNum !== currentCardIndex) return; // Only lock target to top card

                    isDragging = true;
                    card.classList.add('dragging');
                    startX = e.touches[0].clientX;
                    startY = e.touches[0].clientY;
                    card.style.transition = 'none'; 
                }, { passive: true });

                card.addEventListener('touchmove', e => {
                    if (!isDragging) return;

                    const currentX = e.touches[0].clientX;
                    const deltaX = currentX - startX;
                    const rotationDegree = deltaX * 0.06; 
                    
                    card.style.transform = `translateX(${deltaX}px) rotate(${rotationDegree}deg)`;
                }, { passive: true });

                card.addEventListener('touchend', e => {
                    if (!isDragging) return;
                    isDragging = false;
                    card.classList.remove('dragging');
                    
                    card.style.transition = 'transform 0.3s ease, opacity 0.3s ease';

                    const endX = e.changedTouches[0].clientX;
                    const swipeDistance = endX - startX;
                    const threshold = 100; 

                    if (swipeDistance < -threshold) {
                        executePick(card, 'home', 'swipe-left');
                    } else if (swipeDistance > threshold) {
                        executePick(card, 'away', 'swipe-right');
                    } else {
                        card.style.transform = 'translateX(0px) rotate(0deg)';
                    }
                }, { passive: true });
            });
        }

        function handleBtnPick(cardId, pickType) {
            const card = document.getElementById(cardId);
            const cardIdNum = parseInt(cardId.split('-')[1]);
            
            // Verification line to ignore clicks targeting lower hidden levels
            if (cardIdNum !== currentCardIndex) return;

            const animationClass = pickType === 'home' ? 'swipe-left' : 'swipe-right';
            executePick(card, pickType, animationClass);
        }

        function executePick(cardElement, pickType, animationClass) {
            const cardId = cardElement.id;
            const chosenTeam = cardElement.getAttribute(`data-${pickType}`);
            
            savedPicks[cardId] = chosenTeam;
            console.log(`Saved Pick Array: ${cardId} -> ${chosenTeam}`);

            triggerToastNotification(chosenTeam);

            cardElement.removeAttribute('style'); 
            cardElement.classList.add(animationClass);

            currentCardIndex++;
            updateActiveCardVisibility();
            renderProgressUpdates();
        }

        function triggerToastNotification(teamName) {
            const toast = document.getElementById('toast');
            clearTimeout(toastTimeout);
            toast.innerText = `LOCKED: ${teamName}`;
            toast.classList.add('show');
            
            toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 1200);
        }

        function renderProgressUpdates() {
            const display = document.getElementById('progress');
            if (currentCardIndex <= totalCards) {
                display.innerText = `GAME ${currentCardIndex} OF ${totalCards}`;
            } else {
                display.innerText = "ALL PICKS LOCKED!";
                display.style.color = "var(--retro-green)";      
                display.style.borderColor = "var(--retro-green)";
            }
        }

        // Initialize execution on content render load
        window.addEventListener('DOMContentLoaded', loadWeekOneGames);
    </script>
</body>
</html>
