<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mama's Store Hub - Detailed Weekly Ledger</title>
    
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --wh-yellow: #facc15;
            --wh-yellow-hover: #eab308;
            --bg-dark: #0c0a09;
            --card-dark: #1c1917;
            --border-dark: #292524;
            --text-light: #f5f5f4;
            --text-muted: #a8a29e;
            --pos-green: #10b981;
            --neg-red: #ef4444;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", Roboto, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Waffle House Header Block */
        .app-header {
            background: #000000;
            padding: 16px;
            border-bottom: 4px solid var(--wh-yellow);
            text-align: center;
            flex-shrink: 0;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.5);
        }
        
        .logo-box {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 4px;
            margin-bottom: 12px;
        }
        .logo-block {
            background: var(--wh-yellow);
            color: #000000;
            font-family: monospace;
            font-weight: 900;
            font-size: 1.4rem;
            padding: 2px 8px;
            border-radius: 2px;
        }
        .logo-text {
            color: var(--wh-yellow);
            font-weight: 900;
            font-family: monospace;
            font-size: 1.4rem;
            letter-spacing: -1px;
            margin-left: 4px;
        }

        .store-tabs { display: flex; justify-content: center; gap: 6px; max-width: 450px; margin: 0 auto; }
        .tab-btn {
            flex: 1; padding: 10px; border: 1px solid var(--border-dark);
            background: var(--card-dark); color: var(--text-muted); font-weight: 800; 
            border-radius: 8px; font-size: 0.8rem; text-transform: uppercase; cursor: pointer;
            transition: all 0.15s ease;
        }
        .tab-btn.active { background: var(--wh-yellow); color: #000000; border-color: var(--wh-yellow); }

        .app-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .wh-card {
            background: var(--card-dark);
            border: 1px solid var(--border-dark);
            border-radius: 16px;
            padding: 16px;
            max-width: 600px;
            margin: 0 auto;
            box-shadow: 0 8px 16px -2px rgba(0, 0, 0, 0.4);
        }

        .form-group { display: flex; flex-direction: column; margin-bottom: 20px; }
        label { font-size: 0.75rem; font-weight: 800; margin-bottom: 8px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;}
        
        input.week-picker { 
            padding: 14px; border: 1px solid var(--border-dark); border-radius: 10px; 
            font-size: 1rem; background: #000000; color: #ffffff; width: 100%; 
            font-weight: 600; text-align: center;
        }
        input.week-picker:focus { outline: 2px solid var(--wh-yellow); }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(80%); }

        /* Ledger Container Stack */
        .ledger-container { display: flex; flex-direction: column; gap: 20px; }
        
        .day-block {
            background: #000000;
            border: 1px solid var(--border-dark);
            border-radius: 14px;
            padding: 14px;
        }
        
        .day-header {
            font-size: 0.95rem; font-weight: 800; color: var(--wh-yellow);
            text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border-dark);
            padding-bottom: 8px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center;
        }
        .date-sub { color: var(--text-muted); font-family: monospace; font-size: 0.8rem; }

        /* Metric Matrix Grid View Setup */
        .grid-header-row {
            display: grid; grid-template-columns: 2.5fr 1.5fr 1.5fr 1.2fr 1.2fr; gap: 6px;
            padding: 0 4px 6px 4px; font-size: 0.65rem; font-weight: 800; color: var(--text-muted);
            text-transform: uppercase; border-bottom: 1px dashed var(--border-dark); margin-bottom: 8px;
            text-align: center;
        }
        .grid-header-row div:first-child { text-align: left; }

        .metric-grid-row {
            display: grid; grid-template-columns: 2.5fr 1.5fr 1.5fr 1.2fr 1.2fr; gap: 6px;
            align-items: center; padding: 4px 0; border-bottom: 1px solid rgba(41, 37, 36, 0.5);
        }
        .metric-grid-row:last-child { border-bottom: none; }

        .metric-label { font-size: 0.75rem; font-weight: 700; color: var(--text-light); text-transform: uppercase; }
        
        /* Inline input styling for fast manual corrections */
        .val-input {
            width: 100%; background: #1c1917; border: 1px solid var(--border-dark);
            color: #ffffff; padding: 6px; border-radius: 6px; text-align: center;
            font-family: monospace; font-size: 0.9rem; font-weight: 700;
        }
        .val-input:disabled { background: transparent; border-color: transparent; color: var(--wh-yellow); }
        .ly-display { color: var(--text-muted); font-family: monospace; font-size: 0.9rem; font-weight: 600; text-align: center; }

        /* Dynamic Colors for Variance Outputs */
        .variance-box { font-family: monospace; font-size: 0.85rem; font-weight: 800; text-align: center; }
        .var-pos { color: var(--pos-green); }
        .var-neg { color: var(--neg-red); }
        .var-zero { color: var(--text-muted); }

        /* Edit/Action Controls Layout */
        .action-cell { display: flex; justify-content: center; }
        .action-btn {
            background: transparent; border: none; color: var(--text-muted); cursor: pointer;
            font-size: 1.2rem; display: flex; align-items: center; padding: 4px; border-radius: 4px;
        }
        .action-btn:hover { color: var(--wh-yellow); }
        .action-btn.saving { color: var(--pos-green); }

        .no-entry-card {
            text-align: center; padding: 20px 0; color: var(--text-muted);
            font-size: 0.85rem; font-style: italic; font-weight: 500;
        }

        .sync-indicator {
            text-align: center; color: var(--text-muted); font-size: 0.7rem; font-weight: bold;
            margin-top: 24px; text-transform: uppercase; letter-spacing: 1px; display: flex;
            align-items: center; justify-content: center; gap: 4px;
        }
        .sync-indicator ion-icon { color: #10b981; }
        .nav-back { text-decoration: none; display: block; margin: 10px auto; max-width: 600px; padding: 0 16px; }
        .nav-back h1 { font-size: 1.2rem; color: var(--text-muted); margin: 0; font-weight: 600; }
        .nav-back h1:hover { color: var(--wh-yellow); }
    </style>
</head>
<body>
<div class="waho-nav-bar">
    <button class="nav-item" id="nav-entry" onclick="navigateTo('WahoEntry.html')">
        <ion-icon name="create-outline"></ion-icon>
        <span>Daily Entry</span>
    </button>
    <button class="nav-item" id="nav-ledger" onclick="navigateTo('WahoLedger.html')">
        <ion-icon name="list-box-outline"></ion-icon>
        <span>Weekly Ledger</span>
    </button>
    <button class="nav-item" id="nav-totals" onclick="navigateTo('WahoTotals.html')">
        <ion-icon name="calculator-outline"></ion-icon>
        <span>Weekly Totals</span>
    </button>
</div>

<style>
    /* Fixed Bottom Navigation Container */
    .waho-nav-bar {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: 65px;
        background: #000000;
        border-top: 2px solid #292524;
        display: flex;
        justify-content: space-around;
        align-items: center;
        z-index: 9999;
        padding-bottom: env(safe-area-inset-bottom); /* Fixes iPhone notch overlap */
    }

    /* Individual Navigation Button */
    .nav-item {
        background: transparent;
        border: none;
        color: #a8a29e; /* Muted color for inactive pages */
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 4px;
        flex: 1;
        height: 100%;
        cursor: pointer;
        transition: all 0.15s ease;
    }

    .nav-item ion-icon {
        font-size: 1.4rem;
    }

    .nav-item span {
        font-size: 0.7rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    /* Active Page Highlight Rule */
    .nav-item.active-page {
        color: #facc15; /* Signature Waho Yellow */
    }

    /* Shift the app padding up so nothing gets covered by the nav bar */
    body {
        padding-bottom: 75px !important;
    }
</style>

<script>
    // Navigation Routing Engine
    function navigateTo(pageUrl) {
        window.location.href = pageUrl;
    }

    // Automatically highlight the current active button based on the file name
    document.addEventListener("DOMContentLoaded", () => {
        const currentFile = window.location.pathname.split("/").pop().toLowerCase();
        
        // Adjust these file names if your actual files are named differently!
        if (currentFile === "WahoDaily.html" || currentFile === "") {
            document.getElementById("nav-entry").classList.add("active-page");
        } else if (currentFile === "WahoNumbers.html") {
            document.getElementById("nav-ledger").classList.add("active-page");
        } else if (currentFile === "index.html") {
            document.getElementById("nav-totals").classList.add("active-page");
        }
         else if (currentFile === "submitWahoNumbers.html") {
            document.getElementById("nav-totals").classList.add("active-page");
        }
        else if (currentFile === "weekly_totals.html") {
            document.getElementById("nav-totals").classList.add("active-page");
        }
    });
</script>

    <header class="app-header">
        <div class="logo-box">
            <span class="logo-block">W</span>
            <span class="logo-block">H</span>
            <span class="logo-text">LEDGER MANAGER</span>
        </div>
        <div class="store-tabs">
            <button class="tab-btn active" onclick="switchStore('Store 2417')">Store 2417</button>
            <button class="tab-btn" onclick="switchStore('Store 2067')">Store 2067</button>
            <button class="tab-btn" onclick="switchStore('Store 738')">Store 738</button>
        </div>
    </header>

    <main class="app-container">
        <div class="wh-card">
            
            <div class="form-group">
                <label for="ledger-week-date">Select Week Commencing (Monday)</label>
                <input type="date" class="week-picker" id="ledger-week-date" onchange="validateAndRefreshWeek(this.value)">
            </div>

            <div id="ledgerDisplay" class="ledger-container">
                </div>

            <div class="sync-indicator">
                <ion-icon name="checkmark-circle"></ion-icon> Live secure ledger synchronization active
            </div>
        </div>
    </main>

    <script>
        if (typeof masterLedgerClient === 'undefined') {
            const SUPABASE_URL = "https://jkxgemajbqomkhyzhuak.supabase.co"; 
            const SUPABASE_ANON_KEY = "sb_publishable_TGwnDgZjCuavc83TadOaEQ_ESOV715B";
            var masterLedgerClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        }

        const storeIdMap = { "Store 2417": 1, "Store 2067": 2, "Store 738": 3 };
        let currentStore = "Store 2417";
        let cachedMetrics = [];

        // Complete structural definitions layout order matching your layout entry profile
        const targetLabels = [
            "1st Shift", "2nd Shift", "3rd Shift", 
            "D", "WK", "2/2", "FC", "PR", "TRAINING", "EXTRA"
        ];
        const weekdayNames = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"];

        function getNearestPastMonday(d) {
            const day = d.getDay();
            const diff = d.getDate() - day + (day === 0 ? -6 : 1);
            return new Date(d.setDate(diff));
        }
        document.getElementById('ledger-week-date').value = getNearestPastMonday(new Date()).toISOString().split('T')[0];

        window.onload = () => { fetchMasterMetrics(); };

        function switchStore(storeName) {
            currentStore = storeName;
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText.trim() === storeName);
            });
            renderMasterLedger();
        }

        async function fetchMasterMetrics() {
            const { data, error } = await masterLedgerClient.from('daily_metrics').select('*');
            if (!error && data) {
                cachedMetrics = data;
                renderMasterLedger();
            }
        }

        function validateAndRefreshWeek(val) {
            const pickedDate = new Date(val + 'T00:00:00');
            if (pickedDate.getDay() !== 1) {
                alert("Please select an explicit Monday.");
                document.getElementById('ledger-week-date').value = getNearestPastMonday(pickedDate).toISOString().split('T')[0];
            }
            renderMasterLedger();
        }

        function renderMasterLedger() {
            const baseMondayStr = document.getElementById('ledger-week-date').value;
            if (!baseMondayStr) return;

            const targetStoreId = storeIdMap[currentStore];
            const displayBlock = document.getElementById('ledgerDisplay');
            
            let weekDates = [];
            let dayRunner = new Date(baseMondayStr + 'T00:00:00');
            for (let i = 0; i < 7; i++) {
                weekDates.push(dayRunner.toISOString().split('T')[0]);
                dayRunner.setDate(dayRunner.getDate() + 1);
            }

            const storeData = cachedMetrics.filter(item => item.store_id === targetStoreId);
            let htmlOutput = "";

            weekDates.forEach((dateStr, idx) => {
                const dayName = weekdayNames[idx];
                const dayRows = storeData.filter(item => item.entry_date === dateStr);

                htmlOutput += `
                    <div class="day-block" id="block-${dateStr}">
                        <div class="day-header">
                            <span>${dayName}</span>
                            <span class="date-sub">${dateStr}</span>
                        </div>
                `;

                if (dayRows.length === 0) {
                    htmlOutput += `<div class="no-entry-card">No entry added for this day</div></div>`;
                    return;
                }

                // Grid Column Layout Blueprint
                htmlOutput += `
                    <div class="grid-header-row">
                        <div>Metric</div>
                        <div>Today</div>
                        <div>Last Yr</div>
                        <div>+/-</div>
                        <div>Edit</div>
                    </div>
                `;

                targetLabels.forEach(labelName => {
                    const match = dayRows.find(r => r.label && r.label.trim().toLowerCase() === labelName.toLowerCase());
                    
                    if (match) {
                        const todayVal = Number(match.value) || 0;
                        const lastYearVal = Number(match.last_year_value) || 0;
                        const variance = todayVal - lastYearVal;
                        
                        let varianceClass = "var-zero";
                        let varianceText = "0";
                        if (variance > 0) { varianceClass = "var-pos"; varianceText = `+${variance}`; }
                        if (variance < 0) { varianceClass = "var-neg"; varianceText = `${variance}`; }

                        htmlOutput += `
                            <div class="metric-grid-row" id="row-${match.id}">
                                <div class="metric-label">${labelName}</div>
                                <div>
                                    <input type="number" class="val-input" id="input-${match.id}" value="${todayVal}" disabled oninput="recalculateRowVariance(${match.id}, ${lastYearVal})">
                                </div>
                                <div class="ly-display">${lastYearVal || '-'}</div>
                                <div class="variance-box ${varianceClass}" id="var-${match.id}">${varianceText}</div>
                                <div class="action-cell">
                                    <button class="action-btn" id="btn-${match.id}" onclick="toggleEditRow(${match.id}, ${lastYearVal})">
                                        <ion-icon name="create-outline" id="icon-${match.id}"></ion-icon>
                                    </button>
                                </div>
                            </div>
                        `;
                    } else {
                        // Display clean fallback line if metric label isn't present
                        htmlOutput += `
                            <div class="metric-grid-row">
                                <div class="metric-label" style="color: var(--text-muted);">${labelName}</div>
                                <div colspan="4" class="shift-missing" style="grid-column: span 4; text-align: center; color: var(--text-muted); font-size: 0.8rem; font-style: italic;">No entry added</div>
                            </div>
                        `;
                    }
                });

                htmlOutput += `</div>`;
            });

            displayBlock.innerHTML = htmlOutput;
        }

        function recalculateRowVariance(rowId, lastYearVal) {
            const currentVal = Number(document.getElementById(`input-${rowId}`).value) || 0;
            const variance = currentVal - lastYearVal;
            const varBox = document.getElementById(`var-${rowId}`);
            
            varBox.className = "variance-box";
            if (variance > 0) { varBox.classList.add("var-pos"); varBox.innerText = `+${variance}`; }
            else if (variance < 0) { varBox.classList.add("var-neg"); varBox.innerText = variance; }
            else { varBox.classList.add("var-zero"); varBox.innerText = "0"; }
        }

        async function toggleEditRow(rowId, lastYearVal) {
            const inputField = document.getElementById(`input-${rowId}`);
            const actionBtn = document.getElementById(`btn-${rowId}`);
            const actionIcon = document.getElementById(`icon-${rowId}`);

            if (inputField.disabled) {
                // Change to editable mode
                inputField.disabled = false;
                inputField.focus();
                actionIcon.setAttribute("name", "checkmark-sharp");
                actionBtn.classList.add("saving");
            } else {
                // Change back to read-only and save updates to database
                inputField.disabled = true;
                actionIcon.setAttribute("name", "sync-outline");
                
                const updatedValue = Number(inputField.value) || 0;

                const { error } = await masterLedgerClient
                    .from('daily_metrics')
                    .update({ value: updatedValue })
                    .eq('id', rowId);

                if (!error) {
                    // Update cache instantly
                    const record = cachedMetrics.find(m => m.id === rowId);
                    if (record) record.value = updatedValue;
                    
                    actionIcon.setAttribute("name", "create-outline");
                    actionBtn.classList.remove("saving");
                } else {
                    alert("Could not update record: " + error.message);
                    actionIcon.setAttribute("name", "create-outline");
                    actionBtn.classList.remove("saving");
                }
            }
        }
    </script>
</body>
</html>
