<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mama's Daily Logs</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --wh-yellow: #facc15; --bg-dark: #0c0a09; --card-dark: #1c1917; --text-light: #f5f5f4; }
        body { font-family: sans-serif; background: var(--bg-dark); color: var(--text-light); padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .log-row { background: var(--card-dark); padding: 15px; margin-bottom: 10px; border-radius: 8px; border-left: 4px solid var(--wh-yellow); display: flex; justify-content: space-between; }
        select, input { background: #000; color: #fff; padding: 10px; border: 1px solid #333; border-radius: 5px; }
        h2 { color: var(--wh-yellow); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Daily View</h2>
            <select id="storeSelect" onchange="fetchLogs()">
                <option value="1">Store 2417</option>
                <option value="2">Store 2067</option>
                <option value="3">Store 738</option>
            </select>
        </div>
        <input type="date" id="dateFilter" onchange="fetchLogs()">
        <div id="logsDisplay" style="margin-top: 20px;"></div>
    </div>

    <script>
        const supabase = window.supabase.createClient("https://jkxgemajbqomkhyzhuak.supabase.co", "sb_publishable_TGwnDgZjCuavc83TadOaEQ_ESOV715B");
        
        async function fetchLogs() {
            const storeId = document.getElementById('storeSelect').value;
            const date = document.getElementById('dateFilter').value;
            
            let query = supabase.from('daily_metrics').select('*').eq('store_id', storeId);
            if (date) query = query.eq('entry_date', date);
            
            const { data } = await query.order('entry_date', { ascending: false });
            
            const display = document.getElementById('logsDisplay');
            display.innerHTML = data.map(log => `
                <div class="log-row">
                    <span>${log.entry_date} - ${log.label}</span>
                    <strong>$${log.value}</strong>
                </div>
            `).join('');
        }
        
        // Set default date to today
        document.getElementById('dateFilter').value = new Date().toISOString().split('T')[0];
        fetchLogs();
    </script>
</body>
</html>
