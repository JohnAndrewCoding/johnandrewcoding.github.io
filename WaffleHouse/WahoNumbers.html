<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Waffle House Numbers</title>
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="WH Numbers">
  
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <style>
    /* Prevents regular browser touch delays and rubber-banding on iOS */
    body {
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans antialiased min-h-screen pb-12">

  <header class="bg-blue-600 text-white pt-6 pb-4 px-4 sticky top-0 shadow-md z-50">
    <div class="max-w-md mx-auto flex justify-between items-center">
      <h1 class="text-xl font-bold tracking-tight flex items-center gap-2">
        <i data-lucide="database" class="w-5 h-5"></i> WH Numbers
      </h1>
      <input type="date" id="entryDate" class="bg-blue-700 text-white font-medium px-3 py-1.5 rounded-lg border-none text-sm focus:outline-none focus:ring-2 focus:ring-white">
    </div>
  </header>

  <main class="max-w-md mx-auto p-4 space-y-4">
    
    <div class="bg-white p-1.5 rounded-xl shadow-xs flex gap-1 border border-slate-100">
      <button onclick="switchStore('2417')" id="tab-2417" class="flex-1 py-3 text-center font-bold text-sm rounded-lg transition-all duration-200 bg-blue-600 text-white shadow-xs">
        Store 2417
      </button>
      <button onclick="switchStore('2067')" id="tab-2067" class="flex-1 py-3 text-center font-bold text-sm rounded-lg transition-all duration-200 text-slate-500 hover:text-slate-800">
        Store 2067
      </button>
      <button onclick="switchStore('738')" id="tab-738" class="flex-1 py-3 text-center font-bold text-sm rounded-lg transition-all duration-200 text-slate-500 hover:text-slate-800">
        Store 738
      </button>
    </div>

    <form id="metricsForm" class="bg-white rounded-2xl shadow-xs border border-slate-100 p-5 space-y-4">
      <div id="inputsContainer" class="space-y-3.5">
        </div>

      <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-4 rounded-xl shadow-lg shadow-blue-100 flex items-center justify-center gap-2 active:scale-[0.99] transition-transform mt-6">
        <i data-lucide="check-circle" class="w-5 h-5"></i> Submit Data
      </button>
    </form>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <script>
    // --- CONNECTED SUPABASE CONFIGURATION ---
    const SUPABASE_URL = "https://jkxgemajbqomkhyzhuak.supabase.co"; 
    const SUPABASE_ANON_KEY = "sb_publishable_TGwnDgZjCuavc83TadOaEQ_ESOV715B";
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // --- APP GLOBAL STATE ---
    let activeStore = '2417';
    const LABELS = ['1st Shift', '2nd Shift', '3rd Shift', 'D', 'WK', '2/2', 'FC', 'PR', 'Training', 'Extra'];
    
    // Explicit Database Primary Key Relationship Mapping
    const storeIdMap = { '2417': 1, '2067': 2, '738': 3 };

    // Default target date tracking to exact local day context
    const dateInput = document.getElementById('entryDate');
    dateInput.value = new Date().toISOString().split('T')[0];

    // --- FORM RENDER LOGIC ---
    function renderFormFields() {
      const container = document.getElementById('inputsContainer');
      container.innerHTML = ''; 

      LABELS.forEach(label => {
        const row = document.createElement('div');
        row.className = 'flex items-center justify-between gap-4 border-b border-slate-50 pb-3 last:border-0 last:pb-0';
        
        // inputmode="decimal" ensures specialized native number pads on phones
        row.innerHTML = `
          <label class="font-semibold text-slate-700 text-sm flex-1">${label}</label>
          <input 
            type="number" 
            step="any" 
            inputmode="decimal"
            data-label="${label}"
            placeholder="0" 
            class="w-32 bg-slate-50 border border-slate-200 rounded-lg py-2.5 px-3 text-right font-medium text-slate-800 focus:bg-white focus:border-blue-500 focus:ring-2 focus:ring-blue-100 focus:outline-none transition-all"
          >
        `;
        container.appendChild(row);
      });
    }

    // --- INTERACTIVE TAB SWITCHER ---
    function switchStore(storeName) {
      activeStore = storeName;
      const tabs = ['2417', '2067', '738'];
      
      tabs.forEach(t => {
        const tabBtn = document.getElementById(`tab-${t}`);
        if (t === storeName) {
          tabBtn.className = "flex-1 py-3 text-center font-bold text-sm rounded-lg transition-all duration-200 bg-blue-600 text-white shadow-xs";
        } else {
          tabBtn.className = "flex-1 py-3 text-center font-bold text-sm rounded-lg transition-all duration-200 text-slate-500 hover:text-slate-800 bg-transparent";
        }
      });
      
      clearFormValues();
    }

    function clearFormValues() {
      const inputs = document.querySelectorAll('#inputsContainer input');
      inputs.forEach(input => input.value = '');
    }

    // --- BULK DATA TRANSMISSION ---
    document.getElementById('metricsForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const inputs = document.querySelectorAll('#inputsContainer input');
      const selectedDate = dateInput.value;
      const dbStoreId = storeIdMap[activeStore];

      const rowsToInsert = [];
      inputs.forEach(input => {
        if (input.value.trim() !== '') {
          rowsToInsert.push({
            store_id: dbStoreId,
            entry_date: selectedDate,
            label: input.dataset.label,
            value: parseFloat(input.value)
          });
        }
      });

      if (rowsToInsert.length === 0) {
        alert("Please enter at least one metric value before submitting.");
        return;
      }

      try {
        // Safe database ingestion with transactional upsert conflict handling
        const { error } = await supabase
          .from('daily_metrics')
          .upsert(rowsToInsert, { onConflict: 'store_id,entry_date,label' });

        if (error) throw error;

        alert(`Successfully saved logs for Store ${activeStore}!`);
        clearFormValues();
        
      } catch (err) {
        console.error(err);
        alert(`Error saving metrics: ${err.message || err}`);
      }
    });

    // --- LOAD ON EXECUTION ---
    renderFormFields();
    lucide.createIcons();
  </script>
</body>
</html>
