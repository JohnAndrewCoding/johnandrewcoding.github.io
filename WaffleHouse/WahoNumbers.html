<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>WH Numbers Dashboard</title>
  
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="WH Numbers">
  
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <style>
    /* Custom Waffle House Night-Mode Aesthetics */
    input:focus {
      border-color: #facc15 !important;
      border-width: 2px !important;
    }
    body {
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    /* Style native date inputs smoothly for dark theme */
    input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(73%) sepia(63%) saturate(1000%) hue-rotate(359deg) brightness(103%) contrast(104%);
    }
  </style>
</head>
<body class="bg-stone-950 text-stone-100 font-sans antialiased min-h-screen pb-12">

  <header class="bg-black text-yellow-400 pt-6 pb-5 px-4 sticky top-0 shadow-2xl z-50 border-b-4 border-yellow-400">
    <div class="max-w-md mx-auto flex justify-between items-center">
      <h1 class="text-2xl font-black tracking-tighter uppercase flex items-center gap-1.5 font-mono">
        <span class="bg-yellow-400 text-black px-1.5 py-0.5 rounded-xs">W</span>
        <span class="bg-yellow-400 text-black px-1.5 py-0.5 rounded-xs">H</span>
        <span class="text-yellow-400 ml-1">NUMBERS</span>
      </h1>
      <input type="date" id="entryDate" class="bg-stone-900 text-yellow-400 font-bold px-3 py-1.5 rounded-lg border border-stone-800 text-sm focus:outline-none focus:ring-2 focus:ring-yellow-400">
    </div>
  </header>

  <main class="max-w-md mx-auto p-4 space-y-4">
    
    <div class="bg-black p-1.5 rounded-xl shadow-lg flex gap-1.5 border border-stone-900">
      <button type="button" onclick="switchStore('2417')" id="tab-2417" class="flex-1 py-3 text-center font-black text-sm rounded-lg transition-all duration-200 bg-yellow-400 text-black shadow-md uppercase tracking-wider">
        Store 2417
      </button>
      <button type="button" onclick="switchStore('2067')" id="tab-2067" class="flex-1 py-3 text-center font-bold text-sm rounded-lg transition-all duration-200 text-stone-500 hover:text-yellow-400 bg-transparent uppercase tracking-wider">
        Store 2067
      </button>
      <button type="button" onclick="switchStore('738')" id="tab-738" class="flex-1 py-3 text-center font-bold text-sm rounded-lg transition-all duration-200 text-stone-500 hover:text-yellow-400 bg-transparent uppercase tracking-wider">
        Store 738
      </button>
    </div>

    <form id="metricsForm" class="bg-stone-900 rounded-2xl shadow-xl border border-stone-800/80 p-5 space-y-4">
      <div id="inputsContainer" class="space-y-3.5">
        </div>

      <button type="submit" class="w-full bg-yellow-400 hover:bg-yellow-500 text-black font-black uppercase tracking-wider py-4 px-4 rounded-xl shadow-lg flex items-center justify-center gap-2 active:scale-[0.99] transition-transform border-b-4 border-yellow-600 mt-6 text-base">
        <i data-lucide="check-square" class="w-5 h-5 stroke-[2.5]"></i> Submit System Logs
      </button>
    </form>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <script>
    // --- CONNECTED SUPABASE CONFIGURATION ---
    const SUPABASE_URL = "https://jkxgemajbqomkhyzhuak.supabase.co"; 
    const SUPABASE_ANON_KEY = "sb_publishable_TGwnDgZjCuavc83TadOaEQ_ESOV715B";
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // --- APP GLOBAL STATE ---
    let activeStore = '2417';
    const LABELS = ['1st Shift', '2nd Shift', '3rd Shift', 'D', 'WK', '2/2', 'FC', 'PR', 'Training', 'Extra'];
    const storeIdMap = { '2417': 1, '2067': 2, '738': 3 };

    const dateInput = document.getElementById('entryDate');
    dateInput.value = new Date().toISOString().split('T')[0];

    // --- FORM RENDER LOGIC ---
    function renderFormFields() {
      const container = document.getElementById('inputsContainer');
      container.innerHTML = ''; 

      LABELS.forEach(label => {
        const row = document.createElement('div');
        row.className = 'flex items-center justify-between gap-4 border-b border-stone-800 pb-3 last:border-0 last:pb-0';
        
        row.innerHTML = `
          <label class="font-black text-stone-300 text-sm uppercase font-mono tracking-tight flex-1">${label}</label>
          <input 
            type="number" 
            step="any" 
            inputmode="decimal"
            data-label="${label}"
            placeholder="0" 
            class="w-32 bg-stone-950 border-2 border-stone-800 rounded-lg py-2 px-3 text-right font-bold text-yellow-400 placeholder-stone-700 focus:bg-black focus:outline-none transition-all"
          >
        `;
        container.appendChild(row);
      });
    }

    // --- INTERACTIVE TAB SWITCHER ---
    function switchStore(storeName) {
      activeStore = storeName;
      const tabs = ['2417', '2067', '738'];
      
      tabs.forEach(t => {
        const tabBtn = document.getElementById(`tab-${t}`);
        if (t === storeName) {
          tabBtn.className = "flex-1 py-3 text-center font-black text-sm rounded-lg transition-all duration-200 bg-yellow-400 text-black shadow-md uppercase tracking-wider";
        } else {
          tabBtn.className = "flex-1 py-3 text-center font-bold text-sm rounded-lg transition-all duration-200 text-stone-500 hover:text-yellow-400 bg-transparent uppercase tracking-wider";
        }
      });
      
      clearFormValues();
    }

    function clearFormValues() {
      const inputs = document.querySelectorAll('#inputsContainer input');
      inputs.forEach(input => input.value = '');
    }

    // --- BULK DATA TRANSMISSION ---
    document.getElementById('metricsForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const inputs = document.querySelectorAll('#inputsContainer input');
      const selectedDate = dateInput.value;
      const dbStoreId = storeIdMap[activeStore];

      const rowsToInsert = [];
      inputs.forEach(input => {
        if (input.value.trim() !== '') {
          rowsToInsert.push({
            store_id: dbStoreId,
            entry_date: selectedDate,
            label: input.dataset.label,
            value: parseFloat(input.value)
          });
        }
      });

      if (rowsToInsert.length === 0) {
        alert("Please enter at least one metric value before submitting.");
        return;
      }

      try {
        const { error } = await sb
          .from('daily_metrics')
          .upsert(rowsToInsert, { onConflict: 'store_id,entry_date,label' });

        if (error) throw error;

        alert(`Successfully saved logs for Store ${activeStore}!`);
        clearFormValues();
        
      } catch (err) {
        console.error(err);
        alert(`Error saving metrics: ${err.message || err}`);
      }
    });

    // --- LOAD ON EXECUTION ---
    renderFormFields();
    lucide.createIcons();
  </script>
</body>
</html>
