<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>WH Numbers Dashboard</title>
  
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="WH Numbers">
  
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <style>
    input:focus {
      border-color: #facc15 !important;
      border-width: 2px !important;
    }
    body {
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(73%) sepia(63%) saturate(1000%) hue-rotate(359deg) brightness(103%) contrast(104%);
    }
    /* Hide native number input arrows for a tighter mobile layout */
    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    input[type=number] {
      -moz-appearance: textfield;
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    .modal-animate-up {
      animation: slideUp 0.25s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }
  </style>
</head>
<body class="bg-stone-950 text-stone-100 font-sans antialiased min-h-screen pb-12">

<div class="waho-nav-bar">
    <button class="nav-item" id="nav-entry" onclick="navigateTo('WahoNumbers.html')">
        <ion-icon name="create-outline"></ion-icon>
        <span>Daily Entry</span>
    </button>
    <button class="nav-item" id="nav-ledger" onclick="navigateTo('WahoDaily.html')">
        <ion-icon name="list-circle-outline"></ion-icon>
        <span>Weekly View</span>
    </button>
    <button class="nav-item" id="nav-totals" onclick="navigateTo('index.html')">
        <ion-icon name="calculator-outline"></ion-icon>
        <span>Weekly Totals</span>
    </button>
</div>

<style>
    /* Fixed Bottom Navigation Container */
    .waho-nav-bar {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: 65px;
        background: #000000;
        border-top: 2px solid #292524;
        display: flex;
        justify-content: space-around;
        align-items: center;
        z-index: 9999;
        padding-bottom: env(safe-area-inset-bottom);
    }

    /* Individual Navigation Button */
    .nav-item {
        background: transparent;
        border: none;
        color: #a8a29e;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 4px;
        flex: 1;
        height: 100%;
        cursor: pointer;
        transition: all 0.15s ease;
    }

    .nav-item ion-icon {
        font-size: 1.4rem;
    }

    .nav-item span {
        font-size: 0.7rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    /* Active Page Highlight Rule */
    .nav-item.active-page {
        color: #facc15; /* Signature Waho Yellow */
    }

    /* Push page content up slightly so the bottom items aren't covered */
    body {
        padding-bottom: 80px !important;
    }
</style>

<script>
    // Navigation Routing Engine
    function navigateTo(pageUrl) {
        window.location.href = pageUrl;
    }

    // Automatically highlight the active tab using your precise filenames
    document.addEventListener("DOMContentLoaded", () => {
        const currentFile = window.location.pathname.split("/").pop().toLowerCase();
        
        if (currentFile === "WahoNumbers.html" || currentFile === "") {
            document.getElementById("nav-entry").classList.add("active-page");
        } else if (currentFile === "wahodaily.html") {
            document.getElementById("nav-ledger").classList.add("active-page");
        } else if (currentFile === "index.html") {
            document.getElementById("nav-totals").classList.add("active-page");
        }
    });
</script>
  
  <!-- STICKY HEADER WITH TOP-RIGHT VIEW PAST ENTRIES AND WEEKLY TOTALS TOGGLES -->
  <header class="bg-black text-yellow-400 pt-6 pb-5 px-4 sticky top-0 shadow-2xl z-50 border-b-4 border-yellow-400">
    <div class="max-w-md mx-auto flex justify-between items-center">
      <h1 class="text-2xl font-black tracking-tighter uppercase flex items-center gap-1.5 font-mono">
        <span class="bg-yellow-400 text-black px-1.5 py-0.5 rounded-xs">W</span>
        <span class="bg-yellow-400 text-black px-1.5 py-0.5 rounded-xs">H</span>
        <span class="text-yellow-400 ml-1">NUMBERS</span>
      </h1>
      <div class="flex items-center gap-2">
        <input type="date" id="entryDate" class="bg-stone-900 text-yellow-400 font-bold px-3 py-1.5 rounded-lg border border-stone-800 text-sm focus:outline-none focus:ring-2 focus:ring-yellow-400">
        
        <!-- NEW WEEKLY TOTALS NAVIGATION BUTTON -->
        <a href="weekly_totals.html" class="bg-stone-900 hover:bg-stone-850 text-yellow-400 border border-stone-800 p-2 rounded-lg active:scale-95 transition-transform flex items-center justify-center" title="Weekly Totals">
          <i data-lucide="calendar-range" class="w-5 h-5 stroke-[2.5]"></i>
        </a>

        <!-- VIEW PAST ENTRIES ACTION BUTTON -->
        <button type="button" onclick="openHistoryModal()" class="bg-stone-900 hover:bg-stone-850 text-yellow-400 border border-stone-800 p-2 rounded-lg active:scale-95 transition-transform cursor-pointer" title="View Past Entries">
          <i data-lucide="list-ordered" class="w-5 h-5 stroke-[2.5]"></i>
        </button>
      </div>
    </div>
  </header>

  <main class="max-w-md mx-auto p-4 space-y-4">
    
    <div class="bg-black p-1.5 rounded-xl shadow-lg flex gap-1.5 border border-stone-900">
      <button type="button" onclick="switchStore('2417')" id="tab-2417" class="flex-1 py-3 text-center font-black text-sm rounded-lg transition-all duration-200 bg-yellow-400 text-black shadow-md uppercase tracking-wider">
        Store 2417
      </button>
      <button type="button" onclick="switchStore('2067')" id="tab-2067" class="flex-1 py-3 text-center font-bold text-sm rounded-lg transition-all duration-200 text-stone-500 hover:text-yellow-400 bg-transparent uppercase tracking-wider">
        Store 2067
      </button>
      <button type="button" onclick="switchStore('738')" id="tab-738" class="flex-1 py-3 text-center font-bold text-sm rounded-lg transition-all duration-200 text-stone-500 hover:text-yellow-400 bg-transparent uppercase tracking-wider">
        Store 738
      </button>
    </div>

    <form id="metricsForm" class="bg-stone-900 rounded-2xl shadow-xl border border-stone-800/80 p-4 space-y-4">
      
      <div class="flex text-[10px] font-black uppercase font-mono tracking-wider text-stone-500 px-1 border-b border-stone-800 pb-1">
        <div class="flex-1">Metric</div>
        <div class="w-72 flex gap-2 justify-end text-center">
          <div class="w-22">Today</div>
          <div class="w-22">Last Year</div>
          <div class="w-22">+/-</div>
        </div>
      </div>

      <div id="inputsContainer" class="space-y-4"></div>

      <button type="submit" class="w-full bg-yellow-400 hover:bg-yellow-500 text-black font-black uppercase tracking-wider py-4 px-4 rounded-xl shadow-lg flex items-center justify-center gap-2 active:scale-[0.99] transition-transform border-b-4 border-yellow-600 mt-6 text-base cursor-pointer">
        <i data-lucide="check-square" class="w-5 h-5 stroke-[2.5]"></i> Submit System Logs
      </button>
    </form>
  </main>

  <!-- MOBILE PULL-UP HISTORY SHEET MODAL -->
  <div id="historyModal" class="hidden fixed inset-0 z-50 bg-black/70 flex items-end">
    <div class="bg-stone-900 w-full max-w-md mx-auto border-t-4 border-yellow-400 rounded-t-2xl max-h-[85vh] flex flex-col modal-animate-up">
      
      <!-- Modal Sticky Top Bar -->
      <div class="p-4 border-b border-stone-800 flex justify-between items-center shrink-0">
        <div class="flex flex-col">
          <span class="text-[10px] font-black uppercase tracking-widest text-yellow-400 font-mono">Records Management</span>
          <h2 id="historyModalTitle" class="text-base font-black tracking-tight text-white uppercase font-mono">Store 2417 History</h2>
        </div>
        <button onclick="closeHistoryModal()" class="bg-stone-800 text-stone-400 hover:text-white p-2 rounded-lg focus:outline-none cursor-pointer">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>

      <!-- Scrollable History Stack Area -->
      <div id="historyEntriesContainer" class="p-4 overflow-y-auto space-y-3 flex-1">
        <!-- Records render here dynamically -->
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <script>
    // --- CONNECTED SUPABASE CONFIGURATION ---
    const SUPABASE_URL = "https://jkxgemajbqomkhyzhuak.supabase.co"; 
    const SUPABASE_ANON_KEY = "sb_publishable_TGwnDgZjCuavc83TadOaEQ_ESOV715B";
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // --- APP GLOBAL STATE ---
    let activeStore = '2417';
    
    const LABELS = ['1st Shift', '2nd Shift', '3rd Shift', 'D', 'WK', '2/2', 'FC', 'PR', 'Training', 'Extra'];
    const COMPARISON_FIELDS = ['1st Shift', '2nd Shift', '3rd Shift', 'D'];
    
    const storeIdMap = { '2417': 1, '2067': 2, '738': 3 };

    const dateInput = document.getElementById('entryDate');
    dateInput.value = new Date().toISOString().split('T')[0];

    // --- FORM RENDER LOGIC ---
    function renderFormFields() {
      const container = document.getElementById('inputsContainer');
      container.innerHTML = ''; 

      LABELS.forEach(label => {
        const row = document.createElement('div');
        row.className = 'flex items-center justify-between gap-2 border-b border-stone-800/40 pb-3 last:border-0 last:pb-0';
        
        const isComp = COMPARISON_FIELDS.includes(label);

        if (isComp) {
          row.innerHTML = `
            <label class="font-black text-stone-300 text-xs uppercase font-mono tracking-tight flex-1 break-words pr-1">${label}</label>
            <div class="flex gap-2 items-center justify-end w-72">
              <input 
                type="number" step="any" inputmode="decimal" placeholder="0"
                id="today-${label.replace(' ', '_')}"
                oninput="calculateVariance('${label}')"
                class="w-22 bg-stone-950 border border-stone-800 rounded-lg py-2 px-2 text-right font-bold text-yellow-400 placeholder-stone-800 focus:outline-none text-sm transition-all"
              >
              <input 
                type="number" step="any" inputmode="decimal" placeholder="0"
                id="ly-${label.replace(' ', '_')}"
                oninput="calculateVariance('${label}')"
                class="w-22 bg-stone-950 border border-stone-800 rounded-lg py-2 px-2 text-right font-bold text-stone-400 placeholder-stone-800 focus:outline-none text-sm transition-all"
              >
              <div 
                id="var-${label.replace(' ', '_')}" 
                class="w-22 py-2 px-1 text-right font-black font-mono text-sm text-stone-500 bg-stone-950/40 border border-stone-900 rounded-lg select-none"
              >
                0
              </div>
            </div>
          `;
        } else {
          row.innerHTML = `
            <label class="font-black text-stone-300 text-xs uppercase font-mono tracking-tight flex-1">${label}</label>
            <div class="flex gap-2 items-center justify-end w-72">
              <input 
                type="number" step="any" inputmode="decimal" placeholder="0"
                id="today-${label.replace(' ', '_')}"
                class="w-22 bg-stone-950 border border-stone-800 rounded-lg py-2 px-2 text-right font-bold text-yellow-400 placeholder-stone-800 focus:outline-none text-sm transition-all"
              >
              <div class="w-22"></div>
              <div class="w-22"></div>
            </div>
          `;
        }
        container.appendChild(row);
      });
    }

    // --- REAL-TIME CALCULATION ENGINE ---
    function calculateVariance(label) {
      const safeId = label.replace(' ', '_');
      const todayVal = parseFloat(document.getElementById(`today-${safeId}`).value);
      const lyVal = parseFloat(document.getElementById(`ly-${safeId}`).value);
      const displayDiv = document.getElementById(`var-${safeId}`);

      if (isNaN(todayVal) || isNaN(lyVal)) {
        displayDiv.innerText = '0';
        displayDiv.className = "w-22 py-2 px-1 text-right font-black font-mono text-sm text-stone-500 bg-stone-950/40 border border-stone-900 rounded-lg select-none";
        return;
      }

      const diff = todayVal - lyVal;

      if (diff > 0) {
        displayDiv.innerText = `+${diff}`;
        displayDiv.className = "w-22 py-2 px-1 text-right font-black font-mono text-sm text-emerald-400 bg-emerald-950/20 border border-emerald-900/40 rounded-lg select-none";
      } else if (diff < 0) {
        displayDiv.innerText = `${diff}`;
        displayDiv.className = "w-22 py-2 px-1 text-right font-black font-mono text-sm text-rose-500 bg-rose-950/20 border border-rose-900/40 rounded-lg select-none";
      } else {
        displayDiv.innerText = '0';
        displayDiv.className = "w-22 py-2 px-1 text-right font-black font-mono text-sm text-stone-100 bg-stone-800/40 border border-stone-700/40 rounded-lg select-none";
      }
    }

    // --- INTERACTIVE TAB SWITCHER ---
    function switchStore(storeName) {
      activeStore = storeName;
      const tabs = ['2417', '2067', '738'];
      
      tabs.forEach(t => {
        const tabBtn = document.getElementById(`tab-${t}`);
        if (t === storeName) {
          tabBtn.className = "flex-1 py-3 text-center font-black text-sm rounded-lg transition-all duration-200 bg-yellow-400 text-black shadow-md uppercase tracking-wider";
        } else {
          tabBtn.className = "flex-1 py-3 text-center font-bold text-sm rounded-lg transition-all duration-200 text-stone-500 hover:text-yellow-400 bg-transparent uppercase tracking-wider";
        }
      });
      
      clearFormValues();
      
      if(!document.getElementById('historyModal').classList.contains('hidden')) {
        loadHistoryData();
      }
    }

    function clearFormValues() {
      LABELS.forEach(label => {
        const safeId = label.replace(' ', '_');
        const todayInput = document.getElementById(`today-${safeId}`);
        const lyInput = document.getElementById(`ly-${safeId}`);
        const varDiv = document.getElementById(`var-${safeId}`);

        if (todayInput) todayInput.value = '';
        if (lyInput) lyInput.value = '';
        if (varDiv) {
          varDiv.innerText = '0';
          varDiv.className = "w-22 py-2 px-1 text-right font-black font-mono text-sm text-stone-500 bg-stone-950/40 border border-stone-900 rounded-lg select-none";
        }
      });
    }

    // --- BULK DATA TRANSMISSION ---
    document.getElementById('metricsForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const selectedDate = dateInput.value;
      const dbStoreId = storeIdMap[activeStore];
      const rowsToInsert = [];

      LABELS.forEach(label => {
        const safeId = label.replace(' ', '_');
        const todayVal = parseFloat(document.getElementById(`today-${safeId}`).value);
        const lyInput = document.getElementById(`ly-${safeId}`);
        const lyVal = lyInput ? parseFloat(lyInput.value) : null;

        if (!isNaN(todayVal)) {
          const rowPayload = {
            store_id: dbStoreId,
            entry_date: selectedDate,
            label: label,
            value: todayVal,
            last_year_value: !isNaN(lyVal) ? lyVal : null,
            variance: (!isNaN(lyVal)) ? (todayVal - lyVal) : null
          };
          rowsToInsert.push(rowPayload);
        }
      });

      if (rowsToInsert.length === 0) {
        alert("Please enter at least one metric value before submitting.");
        return;
      }

      try {
        const { error } = await sb
          .from('daily_metrics')
          .upsert(rowsToInsert, { onConflict: 'store_id,entry_date,label' });

        if (error) throw error;

        alert(`Successfully saved logs for Store ${activeStore}!`);
        clearFormValues();
        
      } catch (err) {
        console.error(err);
        alert(`Error saving metrics: ${err.message || err}`);
      }
    });

    // --- HISTORY VIEWER PANEL CONFIGURATION ---
    function openHistoryModal() {
      document.getElementById('historyModal').classList.remove('hidden');
      loadHistoryData();
    }

    function closeHistoryModal() {
      document.getElementById('historyModal').classList.add('hidden');
    }

    async function loadHistoryData() {
      document.getElementById('historyModalTitle').innerText = `Store ${activeStore} History`;
      const container = document.getElementById('historyEntriesContainer');
      container.innerHTML = '<p class="text-center font-bold text-sm text-stone-500 py-6 font-mono animate-pulse">CONNECTING TO CLOUD...</p>';

      try {
        const { data, error } = await sb
          .from('daily_metrics')
          .select('*')
          .eq('store_id', storeIdMap[activeStore])
          .order('entry_date', { ascending: false });

        if (error) throw error;

        if (!data || data.length === 0) {
          container.innerHTML = '<p class="text-center text-stone-500 text-sm font-bold font-mono py-6">NO PAST LOGS RECORDED</p>';
          return;
        }

        const groupedByDate = {};
        data.forEach(row => {
          if (!groupedByDate[row.entry_date]) {
            groupedByDate[row.entry_date] = [];
          }
          groupedByDate[row.entry_date].push(row);
        });

        container.innerHTML = '';

        Object.keys(groupedByDate).forEach(dateStr => {
          const metrics = groupedByDate[dateStr];
          
          const dateObj = new Date(dateStr + 'T00:00:00');
          const formattedDate = dateObj.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });

          const logCard = document.createElement('div');
          logCard.className = 'bg-black border border-stone-800 rounded-xl p-3.5 space-y-2 relative shadow-md';

          let innerHTML = `
            <div class="flex justify-between items-start border-b border-stone-800/80 pb-2">
              <div>
                <h4 class="font-black text-sm text-yellow-400 font-mono uppercase tracking-tight">${formattedDate}</h4>
                <p class="text-[9px] font-bold text-stone-500 font-mono uppercase tracking-widest mt-0.5">${metrics.length} metrics captured</p>
              </div>
              <button onclick="deleteEntireDay('${dateStr}', ${storeIdMap[activeStore]})" class="text-stone-600 hover:text-rose-500 p-1 transition-colors cursor-pointer" title="Delete Logs">
                <i data-lucide="trash-2" class="w-4 h-4 stroke-[2.5]"></i>
              </button>
            </div>
            <div class="grid grid-cols-2 gap-x-4 gap-y-1 pt-1 text-xs">
          `;

          metrics.forEach(m => {
            let varSpan = '';
            if (m.variance !== null) {
              if (m.variance > 0) varSpan = `<span class="text-emerald-400 font-mono font-bold text-[11px] ml-1">(+${m.variance})</span>`;
              else if (m.variance < 0) varSpan = `<span class="text-rose-500 font-mono font-bold text-[11px] ml-1">(${m.variance})</span>`;
              else varSpan = `<span class="text-stone-600 font-mono font-bold text-[11px] ml-1">(0)</span>`;
            }

            innerHTML += `
              <div class="flex justify-between py-0.5 border-b border-stone-900/40">
                <span class="text-stone-400 font-medium font-mono text-[11px]">${m.label}:</span>
                <span class="text-stone-200 font-black font-mono text-[11px]">${m.value}${varSpan}</span>
              </div>
            `;
          });

          innerHTML += `</div>`;
          logCard.innerHTML = innerHTML;
          container.appendChild(logCard);
        });

        lucide.createIcons({ attrs: { class: ["shrink-0"] }, container: container });

      } catch (err) {
        console.error(err);
        container.innerHTML = `<p class="text-center text-rose-500 font-bold text-xs font-mono py-6 uppercase">SYNC FALLBACK ERROR: ${err.message || err}</p>`;
      }
    }

    async function deleteEntireDay(dateStr, storeId) {
      if (!confirm(`Are you sure you want to permanently delete all database metrics for store entries on ${dateStr}?`)) return;

      try {
        const { error } = await sb
          .from('daily_metrics')
          .delete()
          .eq('store_id', storeId)
          .eq('entry_date', dateStr);

        if (error) throw error;
        loadHistoryData();
      } catch (err) {
        console.error(err);
        alert(`Failed to delete records: ${err.message || err}`);
      }
    }

    // --- LOAD ON EXECUTION ---
    renderFormFields();
    lucide.createIcons();
  </script>
</body>
</html>
