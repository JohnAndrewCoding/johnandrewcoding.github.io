<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mama's Store Hub - Weekly Totals View</title>
    
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --wh-yellow: #facc15;
            --wh-yellow-hover: #eab308;
            --bg-dark: #0c0a09;
            --card-dark: #1c1917;
            --border-dark: #292524;
            --text-light: #f5f5f4;
            --text-muted: #a8a29e;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", Roboto, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Waffle House Header Block */
        .app-header {
            background: #000000;
            padding: 16px;
            border-bottom: 4px solid var(--wh-yellow);
            text-align: center;
            flex-shrink: 0;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.5);
        }
        
        .logo-box {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 4px;
            margin-bottom: 12px;
        }
        .logo-block {
            background: var(--wh-yellow);
            color: #000000;
            font-family: monospace;
            font-weight: 900;
            font-size: 1.4rem;
            padding: 2px 8px;
            border-radius: 2px;
        }
        .logo-text {
            color: var(--wh-yellow);
            font-weight: 900;
            font-family: monospace;
            font-size: 1.4rem;
            letter-spacing: -1px;
            margin-left: 4px;
        }

        .store-tabs { display: flex; justify-content: center; gap: 6px; max-width: 400px; margin: 0 auto; }
        .tab-btn {
            flex: 1; padding: 10px; border: 1px solid var(--border-dark);
            background: var(--card-dark); color: var(--text-muted); font-weight: 800; 
            border-radius: 8px; font-size: 0.8rem; text-transform: uppercase; cursor: pointer;
            transition: all 0.15s ease;
        }
        .tab-btn.active { background: var(--wh-yellow); color: #000000; border-color: var(--wh-yellow); }

        /* View Content Framer */
        .app-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
        }

        .wh-card {
            background: var(--card-dark);
            border: 1px solid var(--border-dark);
            border-radius: 16px;
            padding: 20px;
            max-width: 500px;
            margin: 0 auto;
            box-shadow: 0 8px 16px -2px rgba(0, 0, 0, 0.4);
        }

        .form-group { display: flex; flex-direction: column; margin-bottom: 16px; }
        label { font-size: 0.75rem; font-weight: 800; margin-bottom: 8px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;}
        
        input { 
            padding: 14px; border: 1px solid var(--border-dark); border-radius: 10px; 
            font-size: 1rem; background: #000000; color: #ffffff; width: 100%; 
            font-weight: 600; text-align: center;
        }
        input:focus { outline: 2px solid var(--wh-yellow); }
        
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(80%) sepia(50%) saturate(1000%) hue-rotate(360deg);
        }

        h3 { font-size: 0.9rem; margin: 24px 0 12px 0; border-bottom: 2px solid var(--border-dark); padding-bottom: 8px; color: var(--wh-yellow); text-transform: uppercase; letter-spacing: 1px;}

        /* Boundary Info Window Banner */
        .info-banner {
            display: flex; align-items: center; gap: 12px; background: rgba(250, 204, 21, 0.05);
            border: 1px dashed rgba(250, 204, 21, 0.4); border-radius: 12px; padding: 12px; margin-bottom: 20px;
        }
        .info-banner ion-icon { font-size: 1.6rem; color: var(--wh-yellow); flex-shrink: 0; }
        .info-banner p { margin: 0; font-size: 0.8rem; color: var(--text-light); font-weight: 500; line-height: 1.3; }

        /* Dynamic Calculation Rows */
        .total-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px 8px; border-bottom: 1px solid var(--border-dark); font-family: monospace;
        }
        .total-row span:first-child { font-weight: 700; color: var(--text-muted); font-size: 0.95rem; }
        .total-row span:last-child { font-weight: 900; color: #ffffff; font-size: 1.15rem; }

        /* Massive Grand Total Highlight Card */
        .grand-total-card {
            background: linear-gradient(135deg, #292524 0%, #000000 100%);
            border: 2px solid var(--wh-yellow); border-radius: 14px; padding: 20px;
            text-align: center; margin-top: 24px; box-shadow: inset 0 0 20px rgba(0,0,0,0.6);
        }
        .grand-total-card h4 { margin: 0 0 8px 0; color: var(--wh-yellow); text-transform: uppercase; font-size: 0.85rem; letter-spacing: 1.5px; }
        .grand-total-card .grand-value { font-size: 2.4rem; font-weight: 900; font-family: monospace; color: #ffffff; letter-spacing: -1px; }

        .sync-indicator {
            text-align: center; color: var(--text-muted); font-size: 0.7rem; font-weight: bold;
            margin-top: 16px; text-transform: uppercase; letter-spacing: 1px; display: flex;
            align-items: center; justify-content: center; gap: 4px;
        }
        .sync-indicator ion-icon { color: #10b981; }
    </style>
</head>
<body>
   <div class="waho-nav-bar">
    <button class="nav-item" id="nav-entry" onclick="navigateTo('WahoNumbers.html')">
        <ion-icon name="create-outline"></ion-icon>
        <span>Daily Entry</span>
    </button>
    <button class="nav-item" id="nav-ledger" onclick="navigateTo('WahoDaily.html')">
        <ion-icon name="list-circle-outline"></ion-icon>
        <span>Weekly View</span>
    </button>
    <button class="nav-item" id="nav-totals" onclick="navigateTo('index.html')">
        <ion-icon name="calculator-outline"></ion-icon>
        <span>Weekly Totals</span>
    </button>
</div>

<style>
    /* Fixed Bottom Navigation Container */
    .waho-nav-bar {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: 65px;
        background: #000000;
        border-top: 2px solid #292524;
        display: flex;
        justify-content: space-around;
        align-items: center;
        z-index: 9999;
        padding-bottom: env(safe-area-inset-bottom);
    }

    /* Individual Navigation Button */
    .nav-item {
        background: transparent;
        border: none;
        color: #a8a29e;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 4px;
        flex: 1;
        height: 100%;
        cursor: pointer;
        transition: all 0.15s ease;
    }

    .nav-item ion-icon {
        font-size: 1.4rem;
    }

    .nav-item span {
        font-size: 0.7rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    /* Active Page Highlight Rule */
    .nav-item.active-page {
        color: #facc15; /* Signature Waho Yellow */
    }

    /* Push page content up slightly so the bottom items aren't covered */
    body {
        padding-bottom: 80px !important;
    }
</style>

<script>
    // Navigation Routing Engine
    function navigateTo(pageUrl) {
        window.location.href = pageUrl;
    }

    // Automatically highlight the active tab using your precise filenames
    document.addEventListener("DOMContentLoaded", () => {
        const currentFile = window.location.pathname.split("/").pop().toLowerCase();
        
        if (currentFile === "WahoNumbers.html" || currentFile === "") {
            document.getElementById("nav-entry").classList.add("active-page");
        } else if (currentFile === "wahodaily.html") {
            document.getElementById("nav-ledger").classList.add("active-page");
        } else if (currentFile === "index.html") {
            document.getElementById("nav-totals").classList.add("active-page");
        }
    });
</script>

    <header class="app-header">
        <div class="logo-box">
            <span class="logo-block">W</span>
            <span class="logo-block">H</span>
            <span class="logo-text">WEEKLY TOTALS</span>
        </div>
        <div class="store-tabs">
            <button class="tab-btn active" onclick="switchStore('Store 1')">Store 1</button>
            <button class="tab-btn" onclick="switchStore('Store 2')">Store 2</button>
            <button class="tab-btn" onclick="switchStore('Store 3')">Store 3</button>
        </div>
    </header>

    <main class="app-container">
        <div class="wh-card">
            
            <div class="form-group">
                <label for="weekly-total-date">Select Week Commencing (Monday)</label>
                <input type="date" id="weekly-total-date" onchange="validateAndRefreshWeek(this.value)">
            </div>

            <div class="info-banner">
                <ion-icon name="git-commit-outline"></ion-icon>
                <p id="week-range-label">Filtering live parameters from Monday 2nd shift directly through the following Monday 1st shift.</p>
            </div>

            <h3>Aggregated Shifts Output</h3>
            <div id="totals-output-box">
                <div class="total-row"><span>Total 1st Shifts:</span><span id="tot-shift1">$0</span></div>
                <div class="total-row"><span>Total 2nd Shifts:</span><span id="tot-shift2">$0</span></div>
                <div class="total-row"><span>Total 3rd Shifts:</span><span id="tot-shift3">$0</span></div>
                
                <div class="grand-total-card">
                    <h4>Grand Combined Total</h4>
                    <div class="grand-value" id="tot-grand">$0</div>
                </div>
            </div>

            <div class="sync-indicator">
                <ion-icon name="checkmark-circle"></ion-icon> Live database tracking online
            </div>
        </div>
    </main>

    <script>
        // Database Connection Infrastructure
        const SUPABASE_URL = "https://jkxgemajbqomkhyzhuak.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_TGwnDgZjCuavc83TadOaEQ_ESOV715B";
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Map UI human labels to your backend structural database IDs
        const storeIdMap = { "Store 1": 1, "Store 2": 2, "Store 3": 3 };
        let currentStore = "Store 1";
        let cachedMetrics = [];

        // Automatic Calendar Initialization
        function getNearestPastMonday(d) {
            const day = d.getDay();
            const diff = d.getDate() - day + (day === 0 ? -6 : 1);
            return new Date(d.setDate(diff));
        }
        document.getElementById('weekly-total-date').value = getNearestPastMonday(new Date()).toISOString().split('T')[0];

        window.onload = () => { refreshData(); };

        function switchStore(storeName) {
            currentStore = storeName;
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText === storeName);
            });
            calculateCustomWeeklyTotals();
        }

        async function refreshData() {
            // TARGET CORRECT TABLE: daily_metrics
            const { data, error } = await supabaseClient
                .from('daily_metrics')
                .select('*');
            if (!error && data) {
                cachedMetrics = data;
                calculateCustomWeeklyTotals();
            } else if (error) {
                console.error("Supabase Error:", error.message);
            }
        }

        function validateAndRefreshWeek(val) {
            const pickedDate = new Date(val + 'T00:00:00');
            if (pickedDate.getDay() !== 1) {
                alert("Please select a Monday to accurately view operational weeks.");
                document.getElementById('weekly-total-date').value = getNearestPastMonday(pickedDate).toISOString().split('T')[0];
            }
            calculateCustomWeeklyTotals();
        }

        // Mathematical Custom Operational Shift Processing Engine
        function calculateCustomWeeklyTotals() {
            const baseMondayStr = document.getElementById('weekly-total-date').value;
            if (!baseMondayStr) return;

            const startMon = new Date(baseMondayStr + 'T00:00:00');
            const endMon = new Date(startMon);
            endMon.setDate(startMon.getDate() + 7);

            const startMonISO = startMon.toISOString().split('T')[0];
            const endMonISO = endMon.toISOString().split('T')[0];

            // Render Dynamic UI Label Bounds Indicators
            const fmt = { month: 'short', day: 'numeric' };
            document.getElementById('week-range-label').innerText = 
                `Active Window: ${startMon.toLocaleDateString('en-US', fmt)} (2nd Shift) through ${endMon.toLocaleDateString('en-US', fmt)} (1st Shift).`;

            // Filter metrics by numerical store ID mapped from UI selection
            const targetStoreId = storeIdMap[currentStore];
            const storeData = cachedMetrics.filter(item => item.store_id === targetStoreId);

            let sumShift1 = 0;
            let sumShift2 = 0;
            let sumShift3 = 0;

            storeData.forEach(row => {
                const curDateStr = row.entry_date;
                const value = Number(row.value) || 0;
                const label = row.label ? row.label.trim() : "";

                if (curDateStr >= startMonISO && curDateStr <= endMonISO) {
                    if (curDateStr === startMonISO) {
                        // Start Monday: Ignore 1st Shift, sum 2nd and 3rd shifts
                        if (label === '2nd Shift') sumShift2 += value;
                        if (label === '3rd Shift') sumShift3 += value;
                    } else if (curDateStr === endMonISO) {
                        // Following Monday: Sum 1st Shift only
                        if (label === '1st Shift') sumShift1 += value;
                    } else {
                        // Interior Days (Tuesday through Sunday): Sum all three shifts
                        if (label === '1st Shift') sumShift1 += value;
                        if (label === '2nd Shift') sumShift2 += value;
                        if (label === '3rd Shift') sumShift3 += value;
                    }
                }
            });

            const grandTotal = sumShift1 + sumShift2 + sumShift3;

            // Update UI Interface Targets
            document.getElementById('tot-shift1').innerText = `$${sumShift1.toLocaleString()}`;
            document.getElementById('tot-shift2').innerText = `$${sumShift2.toLocaleString()}`;
            document.getElementById('tot-shift3').innerText = `$${sumShift3.toLocaleString()}`;
            document.getElementById('tot-grand').innerText = `$${grandTotal.toLocaleString()}`;
        }
    </script>
</body>
</html>
